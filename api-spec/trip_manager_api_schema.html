
<div id="erd" style="padding:1rem 0"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
});
const { svg } = await mermaid.render('svg', `erDiagram
  USER ||--o{ TRIP : "creates"
  USER ||--o{ LOCATION : "creates"
  USER ||--o{ ACTIVITY : "creates"
  USER ||--o{ COMMENT : "creates"
  USER ||--o{ COMMENT_REPLY : "creates"
  USER ||--o{ ACTIVITY_LIKE : "creates"
  USER ||--o{ COMMENT_LIKE : "creates"
  USER ||--o{ REPLY_LIKE : "creates"
  TRIP ||--o{ LOCATION : "has"
  TRIP ||--o{ ACTIVITY : "has"
  LOCATION ||--o{ ACTIVITY : "hosts"
  ACTIVITY ||--o{ COMMENT : "has"
  ACTIVITY ||--o{ ACTIVITY_LIKE : "has"
  COMMENT ||--o{ COMMENT_REPLY : "has"
  COMMENT ||--o{ COMMENT_LIKE : "has"
  COMMENT_REPLY ||--o{ REPLY_LIKE : "has"

  USER {
    uuid id PK
    string email
    string avatarKey
    string name
    string passwordHash
    timestamp createdAt
    timestamp updatedAt
  }
  TRIP {
    uuid id PK
    string title
    string shortDescription
    string description
    date startDate
    date endDate
    enum status
    uuid createdBy FK
    timestamp createdAt
    timestamp updatedAt
  }
  LOCATION {
    uuid id PK
    string name
    string city
    string country
    float latitude
    float longitude
    string notes
    int sequence
    uuid tripId FK
    uuid createdBy FK
    timestamp createdAt
    timestamp updatedAt
  }
  ACTIVITY {
    uuid id PK
    string name
    string description
    date date
    time startTime
    time endTime
    enum category
    float cost
    string currency
    uuid tripId FK
    uuid locationId FK
    uuid createdBy FK
    int likeCount
    int commentCount
    timestamp createdAt
    timestamp updatedAt
  }
  ACTIVITY_LIKE {
    uuid id PK
    uuid activityId FK
    uuid userId FK
    timestamp createdAt
  }
  COMMENT {
    uuid id PK
    string text
    string imageKey
    uuid activityId FK
    uuid createdBy FK
    int likeCount
    int replyCount
    timestamp createdAt
    timestamp updatedAt
  }
  COMMENT_REPLY {
    uuid id PK
    string text
    string imageKey
    uuid commentId FK
    uuid createdBy FK
    int likeCount
    timestamp createdAt
    timestamp updatedAt
  }
  COMMENT_LIKE {
    uuid id PK
    uuid commentId FK
    uuid userId FK
    timestamp createdAt
  }
  REPLY_LIKE {
    uuid id PK
    uuid replyId FK
    uuid userId FK
    timestamp createdAt
  }`);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
