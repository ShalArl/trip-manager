openapi: 3.0.0
info:
  title: Trips Service API
  description: API for managing trips
  version: 1.0.0

servers:
  - url: http://localhost:8002/api
    description: Development server

security:
  - firebaseAuth: []

paths:
  /trips:
    get:
      summary: List all trips for current user
      operationId: listTrips
      tags:
        - trips
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Paginated list of trips
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripListResponse'
        '401':
          description: Unauthorized
    post:
      summary: Create a new trip
      operationId: createTrip
      tags:
        - trips
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTripRequest'
      responses:
        '201':
          description: Trip created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripResponse'
        '400':
          description: Invalid input
        '401':
          description: Unauthorized

  /trips/recent:
    get:
      summary: List recent trips across all users
      operationId: listRecentTrips
      tags:
        - trips
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 25
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of recent trips
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripListResponse'

  /trips/search:
    get:
      summary: Search trips
      operationId: searchTrips
      tags:
        - trips
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripListResponse'

  /trips/{tripId}:
    get:
      summary: Get trip details
      operationId: getTrip
      tags:
        - trips
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Trip details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripResponse'
        '401':
          description: Unauthorized
        '404':
          description: Trip not found
    put:
      summary: Update trip
      operationId: updateTrip
      tags:
        - trips
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTripRequest'
      responses:
        '200':
          description: Trip updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripResponse'
        '401':
          description: Unauthorized
        '404':
          description: Trip not found
    delete:
      summary: Delete trip
      operationId: deleteTrip
      tags:
        - trips
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Trip deleted
        '401':
          description: Unauthorized
        '404':
          description: Trip not found

components:
  securitySchemes:
    firebaseAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    UserSummary:
      type: object
      required:
        - id
        - name
        - email
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        avatarUrl:
          type: string
          nullable: true

    TripResponse:
      type: object
      required:
        - id
        - title
        - shortDescription
        - startDate
        - endDate
        - status
        - createdBy
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        shortDescription:
          type: string
        description:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        status:
          type: string
          enum: [planned, ongoing, completed, cancelled]
        createdBy:
          $ref: '#/components/schemas/UserSummary'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TripListResponse:
      type: object
      required:
        - data
        - total
        - limit
        - offset
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TripResponse'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    CreateTripRequest:
      type: object
      required:
        - title
        - shortDescription
        - startDate
        - endDate
      properties:
        title:
          type: string
          minLength: 1
        shortDescription:
          type: string
          minLength: 1
          maxLength: 80
        description:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date

    UpdateTripRequest:
      type: object
      properties:
        title:
          type: string
        shortDescription:
          type: string
          minLength: 1
          maxLength: 80
        description:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        status:
          type: string
          enum: [planned, ongoing, completed, cancelled]