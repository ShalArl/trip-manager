openapi: 3.0.0
info:
  title: Locations Service API
  version: 1.0.0

servers:
  - url: http://localhost:8005/api
    description: Development server

security:
  - firebaseAuth: []

paths:
  /trips/{tripId}/locations:
    get:
      summary: List trip locations
      operationId: listLocations
      tags: [locations]
      parameters:
        - name: tripId
          in: path
          required: true
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 10 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        '200':
          description: Paginated list of locations
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LocationListResponse' }
    post:
      summary: Add location to trip
      operationId: addLocation
      tags: [locations]
      parameters:
        - name: tripId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateLocationRequest' }
      responses:
        '201':
          description: Location added
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LocationResponse' }
        '400':
          description: Invalid input
        '401':
          description: Unauthorized

  /trips/{tripId}/locations/{locationId}:
    put:
      summary: Update location
      operationId: updateLocation
      tags: [locations]
      parameters:
        - name: tripId
          in: path
          required: true
          schema: { type: string }
        - name: locationId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateLocationRequest' }
      responses:
        '200':
          description: Location updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LocationResponse' }
        '401':
          description: Unauthorized
        '404':
          description: Location not found
    delete:
      summary: Remove location from trip
      operationId: deleteLocation
      tags: [locations]
      parameters:
        - name: tripId
          in: path
          required: true
          schema: { type: string }
        - name: locationId
          in: path
          required: true
          schema: { type: string }
      responses:
        '204':
          description: Location removed
        '401':
          description: Unauthorized
        '404':
          description: Location not found

  /trips/{tripId}/locations/{locationId}/images:
    post:
      summary: Add image to location
      operationId: addLocationImage
      tags: [locations]
      parameters:
        - name: tripId
          in: path
          required: true
          schema: { type: string }
        - name: locationId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AddLocationImageRequest' }
      responses:
        '201':
          description: Image added
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LocationImageResponse' }
        '401':
          description: Unauthorized
        '404':
          description: Location not found

  /trips/{tripId}/locations/{locationId}/images/{imageId}:
    delete:
      summary: Remove image from location
      operationId: deleteLocationImage
      tags: [locations]
      parameters:
        - name: tripId
          in: path
          required: true
          schema: { type: string }
        - name: locationId
          in: path
          required: true
          schema: { type: string }
        - name: imageId
          in: path
          required: true
          schema: { type: string }
      responses:
        '204':
          description: Image deleted
        '401':
          description: Unauthorized
        '404':
          description: Image not found

components:
  securitySchemes:
    firebaseAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    UserSummary:
      type: object
      required: [id, name, email]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        avatarUrl:
          type: string
          nullable: true

    LocationImageResponse:
      type: object
      required: [id, locationId, imageUrl]
      properties:
        id:
          type: string
          format: uuid
        locationId:
          type: string
          format: uuid
        imageUrl:
          type: string
          format: uri
        sequence:
          type: integer
        createdAt:
          type: string
          format: date-time

    LocationResponse:
      type: object
      required: [id, createdBy, createdAt, updatedAt, name, city, country, shortDescription, dateFrom, dateTo]
      properties:
        id:
          type: string
          format: uuid
        createdBy:
          $ref: '#/components/schemas/UserSummary'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        name:
          type: string
        city:
          type: string
        country:
          type: string
        shortDescription:
          type: string
        dateFrom:
          type: string
          format: date
        dateTo:
          type: string
          format: date
        latitude:
          type: number
          format: float
          nullable: true
        longitude:
          type: number
          format: float
          nullable: true
        notes:
          type: string
          nullable: true
        sequence:
          type: integer
          nullable: true
        images:
          type: array
          items: { $ref: '#/components/schemas/LocationImageResponse' }

    LocationListResponse:
      type: object
      required: [data, total, limit, offset]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/LocationResponse' }
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    CreateLocationRequest:
      type: object
      required: [name, city, country, shortDescription, dateFrom, dateTo]
      properties:
        name:
          type: string
        city:
          type: string
        country:
          type: string
        shortDescription:
          type: string
        dateFrom:
          type: string
          format: date
        dateTo:
          type: string
          format: date
        latitude:
          type: number
          format: float
        longitude:
          type: number
          format: float
        notes:
          type: string
        sequence:
          type: integer

    UpdateLocationRequest:
      type: object
      properties:
        name:
          type: string
        city:
          type: string
        country:
          type: string
        shortDescription:
          type: string
        dateFrom:
          type: string
          format: date
        dateTo:
          type: string
          format: date
        latitude:
          type: number
          format: float
        longitude:
          type: number
          format: float
        notes:
          type: string
        sequence:
          type: integer

    AddLocationImageRequest:
      type: object
      required: [imageKey]
      properties:
        imageKey:
          type: string
        sequence:
          type: integer