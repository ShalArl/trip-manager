    # ── Comment ───────────────────────────────────────────────────────────────

    CreateCommentRequest:
      description: Request to create a new comment on an activity.
      type: object
      required:
        - text
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 500
          description: Comment text
        imageKey:
          type: string
          nullable: true
          description: Optional S3/MinIO/GCP object key for comment image

    UpdateCommentRequest:
      description: Request to update a comment.
      type: object
      required:
        - text
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 500
          description: Updated comment text
        imageKey:
          type: string
          nullable: true
          description: Optional S3/MinIO/GCP object key for comment image

    CommentResponse:
      description: Full comment object returned by all comment endpoints.
      allOf:
        - $ref: '#/components/schemas/ResourceMeta'
        - type: object
          required:
            - text
            - activityId
          properties:
            text:
              type: string
              description: Comment content
            activityId:
              type: string
              format: uuid
              description: ID of the activity this comment belongs to
            imageUrl:
              type: string
              nullable: true
              description: Short-lived signed URL for comment image
              readOnly: true
            likeCount:
              type: integer
              description: Number of likes on this comment
              readOnly: true
            replyCount:
              type: integer
              description: Number of replies to this comment
              readOnly: true

    CommentListResponse:
      description: Paginated list of comments.
      allOf:
        - $ref: '#/components/schemas/PaginationMeta'
        - type: object
          required:
