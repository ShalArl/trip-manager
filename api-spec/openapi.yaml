          in: path
          required: true
          schema:
            type: string
        - name: activityId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Activity deleted
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Activity not found

  # ─── Likes ────────────────────────────────────────────────────────────────

  /trips/{tripId}/activities/{activityId}/likes:
    post:
      summary: Like an activity
      operationId: likeActivity
      tags:
        - Likes
      parameters:
        - name: tripId
          in: path
