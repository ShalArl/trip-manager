      tags:
        - Comments
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
        - name: activityId
          in: path
          required: true
          schema:
            type: string
        - name: commentId
          in: path
          required: true
          schema:
            type: string
        - name: replyId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Like removed
        '401':
          description: Unauthorized
        '404':
          description: Like not found
    post:
      summary: Like a comment
      operationId: likeComment
      tags:
        - Comments
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
        - name: activityId
          in: path
          required: true
          schema:
            type: string
        - name: commentId
          in: path
          required: true
          schema:
            type: string
      responses:
        '201':
          description: Comment liked successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentLikeResponse'
        '400':
          description: Already liked
        '401':
          description: Unauthorized
        '404':
          description: Comment not found

    delete:
      summary: Unlike a comment
      operationId: unlikeComment
      tags:
        - Comments
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
        - name: activityId
          in: path
          required: true
          schema:
            type: string
        - name: commentId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Like removed
        '401':
          description: Unauthorized
        '404':
          description: Like not found

# ─── Components ───────────────────────────────────────────────────────────────

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        JWT token obtained from /auth/login or /auth/register.
        Include as: Authorization: Bearer <token>

  schemas:

    # ── Shared building blocks ────────────────────────────────────────────────

    ResourceMeta:
      description: >
        Read-only fields present on every persisted resource.
        Reused via allOf composition in all Response schemas.
      type: object
      required:
        - id
        - createdBy
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        createdBy:
          $ref: '#/components/schemas/UserSummary'
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true

    UserSummary:
      description: Minimal user representation embedded in resource responses.
      type: object
      readOnly: true
      required:
        - id
        - name
        - email
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        avatarKey:
           type: string
           description: Optional S3/MinIO/GCP object key for user's avatar image
           readOnly: true


    PaginationMeta:
      description: >
        Pagination envelope reused by all list responses.
        Compose via allOf: add a 'data' property with the specific item array.
      type: object
      required:
        - total
        - limit
        - offset
      properties:
        total:
          type: integer
          description: Total number of items matching the query
        limit:
          type: integer
          description: Max items returned in this page
        offset:
          type: integer
          description: Number of items skipped

    # ── Auth ──────────────────────────────────────────────────────────────────

    CreateUserRequest:
      type: object
      required:
        - email
        - password
        - name
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          description: Minimum 8 characters
        name:
          type: string
          minLength: 1

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      required:
        - token
        - expiresIn
        - user
      properties:
        token:
          type: string
          description: JWT access token
        expiresIn:
          type: integer
          description: Token validity in seconds (e.g. 3600)
        user:
           $ref: '#/components/schemas/UserResponse'

    # ── Upload ────────────────────────────────────────────────────────────────

    PresignedURLRequest:
       description: Request for a presigned URL to upload files directly to S3/MinIO
       type: object
       required:
         - fileName
         - mediaType
       properties:
         fileName:
           type: string
           description: Name of the file to upload (e.g., "avatar.jpg")
           example: avatar.jpg
         mediaType:
           type: string
           enum: [avatar, trip, location, activity]
           description: Type of media being uploaded

    PresignedURLResponse:
       description: Presigned URL response for direct file uploads
       type: object
       required:
         - presignedUrl
         - expiresIn
         - key
       properties:
         presignedUrl:
           type: string
           format: uri
           description: URL that can be used to upload the file directly to S3/MinIO
           example: "http://minio:9000/trip-manager/avatars/user-id.jpg?X-Amz-Algorithm=..."
         expiresIn:
           type: integer
           description: Presigned URL expiration time in seconds (typically 900 = 15 minutes)
           example: 900
         key:
           type: string
           description: Object key to reference this upload in subsequent requests

