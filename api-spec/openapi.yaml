      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
        - name: activityId
          in: path
          required: true
          schema:
            type: string
        - name: commentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCommentReplyRequest'
      responses:
        '201':
          description: Reply added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentReplyResponse'
        '400':
