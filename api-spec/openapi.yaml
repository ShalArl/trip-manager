        '401':
          description: Unauthorized
        '404':
          description: Activity not found

  /trips/{tripId}/activities/{activityId}/comments/{commentId}:
    put:
      summary: Update comment
      operationId: updateComment
      tags:
        - Comments
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
        - name: activityId
          in: path
          required: true
          schema:
            type: string
        - name: commentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCommentRequest'
      responses:
        '200':
          description: Comment updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentResponse'
        '400':
