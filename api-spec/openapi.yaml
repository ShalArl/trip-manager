# ─── Components ───────────────────────────────────────────────────────────────

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        JWT token obtained from /auth/login or /auth/register.
        Include as: Authorization: Bearer <token>

  schemas:

    # ── Shared building blocks ────────────────────────────────────────────────

    ResourceMeta:
      description: >
        Read-only fields present on every persisted resource.
        Reused via allOf composition in all Response schemas.
      type: object
      required:
        - id
        - createdBy
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        createdBy:
          $ref: '#/components/schemas/UserSummary'
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true

    UserSummary:
      description: Minimal user representation embedded in resource responses.
      type: object
      readOnly: true
      required:
        - id
        - name
        - email
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        avatarKey:
           type: string
           description: Optional S3/MinIO/GCP object key for user's avatar image
           readOnly: true


    PaginationMeta:
      description: >
        Pagination envelope reused by all list responses.
        Compose via allOf: add a 'data' property with the specific item array.
      type: object
      required:
        - total
        - limit
        - offset
      properties:
        total:
          type: integer
          description: Total number of items matching the query
        limit:
          type: integer
          description: Max items returned in this page
        offset:
          type: integer
          description: Number of items skipped

    # ── Auth ──────────────────────────────────────────────────────────────────

    CreateUserRequest:
      type: object
      required:
        - email
        - password
        - name
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          description: Minimum 8 characters
        name:
          type: string
          minLength: 1

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      required:
        - token
        - expiresIn
        - user
      properties:
        token:
          type: string
          description: JWT access token
        expiresIn:
          type: integer
          description: Token validity in seconds (e.g. 3600)
        user:
           $ref: '#/components/schemas/UserResponse'

    # ── Upload ────────────────────────────────────────────────────────────────

    PresignedURLRequest:
       description: Request for a presigned URL to upload files directly to S3/MinIO
       type: object
       required:
         - fileName
         - mediaType
       properties:
         fileName:
           type: string
           description: Name of the file to upload (e.g., "avatar.jpg")
           example: avatar.jpg
         mediaType:
           type: string
           enum: [avatar, trip, location, activity]
           description: Type of media being uploaded

    PresignedURLResponse:
       description: Presigned URL response for direct file uploads
       type: object
       required:
         - presignedUrl
         - expiresIn
         - key
       properties:
         presignedUrl:
           type: string
           format: uri
           description: URL that can be used to upload the file directly to S3/MinIO
           example: "http://minio:9000/trip-manager/avatars/user-id.jpg?X-Amz-Algorithm=..."
         expiresIn:
           type: integer
           description: Presigned URL expiration time in seconds (typically 900 = 15 minutes)
           example: 900
         key:
           type: string
           description: Object key to reference this upload in subsequent requests

     # ── User ──────────────────────────────────────────────────────────────────

    UserResponse:
      description: Full user object returned by profile endpoints.
      type: object
      required:
        - id
        - email
        - name
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        email:
          type: string
          format: email
        name:
          type: string
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true
        bio:
          type: string
          description: Optional user bio or profile description
        avatarUrl:
          type: string
          nullable: true
          description: Short-lived signed URL for avatar download
          readOnly: true


    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        bio:
          type: string
          description: Optional user bio or profile description
        avatarKey:
          type: string
          nullable: true
          description: Optional S3/MinIO/GCP object key for user's avatar image

    ChangePasswordRequest:
      type: object
      required:
        - currentPassword
        - newPassword
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
          minLength: 8

    # ── Trip ──────────────────────────────────────────────────────────────────

    CreateTripRequest:
      type: object
      required:
        - title
        - shortDescription
        - startDate
        - endDate
      properties:
        title:
          type: string
          minLength: 1
        shortDescription:
          type: string
          minLength: 1
          maxLength: 80
        description:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date

    UpdateTripRequest:
      type: object
      properties:
        title:
          type: string
        shortDescription:
          type: string
          minLength: 1
          maxLength: 80
        description:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        status:
          type: string
          enum: [planned, ongoing, completed, cancelled]

    TripResponse:
      description: Full trip object returned by all trip endpoints.
      allOf:
        - $ref: '#/components/schemas/ResourceMeta'
        - type: object
          required:
            - title
            - shortDescription
            - startDate
            - endDate
            - status
          properties:
            title:
              type: string
            shortDescription:
              type: string
            description:
              type: string
            startDate:
              type: string
              format: date
            endDate:
              type: string
              format: date
            status:
              type: string
              enum: [planned, ongoing, completed, cancelled]

    TripListResponse:
      description: Paginated list of trips.
      allOf:
        - $ref: '#/components/schemas/PaginationMeta'
        - type: object
          required:
            - data
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/TripResponse'

    # ── Location ─────────────────────────────────────────────────────────────

    CreateLocationRequest:
      type: object
      required:
        - name
        - city
        - country
        - shortDescription
        - dateFrom
        - dateTo
      properties:
        name:
          type: string
        city:
          type: string
        country:
          type: string
        shortDescription:
          type: string
        dateFrom:
          type: string
          format: date
        dateTo:
          type: string
          format: date
        latitude:
          type: number
          format: float
        longitude:
          type: number
          format: float
        notes:
          type: string
        sequence:
          type: integer
          description: Visit sequence number

    UpdateLocationRequest:
      type: object
      properties:
        name:
          type: string
        city:
          type: string
        country:
          type: string
        shortDescription:
          type: string
        dateFrom:
          type: string
          format: date
        dateTo:
          type: string
          format: date
        latitude:
          type: number
          format: float
        longitude:
          type: number
          format: float
        notes:
          type: string
        sequence:
          type: integer
    
    LocationResponse:
      description: Full location object returned by all location endpoints.
      allOf:
        - $ref: '#/components/schemas/ResourceMeta'
        - type: object
          required:
            - name
            - city
            - country
            - shortDescription
            - dateFrom
            - dateTo
          properties:
            name:
              type: string
            city:
              type: string
            country:
              type: string
            shortDescription:
              type: string
            dateFrom:
              type: string
              format: date
            dateTo:
              type: string
              format: date
            latitude:
              type: number
              format: float
            longitude:
              type: number
              format: float
            notes:
              type: string
            sequence:
              type: integer

    LocationListResponse:
      description: Paginated list of locations.
      allOf:
        - $ref: '#/components/schemas/PaginationMeta'
        - type: object
          required:
            - data
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/LocationResponse'

    # ── Activity ─────────────────────────────────────────────────────────────

    CreateActivityRequest:
      type: object
      required:
        - name
        - date
        - locationId
      properties:
        name:
          type: string
        description:
          type: string
        date:
          type: string
          format: date
        startTime:
          type: string
          format: time
        endTime:
          type: string
          format: time
        locationId:
          type: string
          format: uuid
        category:
          type: string
          enum: [sightseeing, dining, transport, accommodation, other]
        cost:
          type: number
          format: float
        currency:
          type: string
          default: USD

    UpdateActivityRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        date:
          type: string
          format: date
        startTime:
          type: string
          format: time
        endTime:
          type: string
          format: time
        locationId:
          type: string
          format: uuid
        category:
          type: string
          enum: [sightseeing, dining, transport, accommodation, other]
        cost:
          type: number
          format: float
        currency:
          type: string

    ActivityResponse:
      description: Full activity object returned by all activity endpoints.
      allOf:
        - $ref: '#/components/schemas/ResourceMeta'
        - type: object
          required:
            - name
            - date
            - locationId
