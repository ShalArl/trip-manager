openapi: 3.0.0
info:
  title: Presigner Service API
  version: 1.0.0

servers:
  - url: http://localhost:8004/api
    description: Development server

security:
  - firebaseAuth: []

paths:
  /uploads/presigned:
    post:
      summary: Get a presigned URL for direct file upload
      description: >
        Request a presigned URL to upload files directly to S3/MinIO without routing through the backend.
        Presigned URLs are valid for 15 minutes and can be used with PUT requests to upload files directly.
      operationId: getPresignedUrl
      tags:
        - Uploads
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PresignedURLRequest'
      responses:
        '200':
          description: Presigned URL generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresignedURLResponse'
        '400':
          description: Invalid mediaType or missing required fields
        '401':
          description: Unauthorized
        '500':
          description: Failed to generate presigned URL



components:
  securitySchemes:
    firebaseAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    PresignedURLRequest:
      description: Request for a presigned URL to upload files directly to S3/MinIO
      type: object
      required:
        - fileName
        - mediaType
      properties:
        fileName:
          type: string
          description: Name of the file to upload (e.g., "avatar.jpg")
          example: avatar.jpg
        mediaType:
          type: string
          enum: [avatar, trip, location, activity]
          description: Type of media being uploaded

    PresignedURLResponse:
      description: Presigned URL response for direct file uploads
      type: object
      required:
        - presignedUrl
        - expiresIn
        - key
      properties:
        presignedUrl:
          type: string
          format: uri
          description: URL that can be used to upload the file directly to S3/MinIO
          example: "http://minio:9000/trip-manager/avatars/user-id.jpg?X-Amz-Algorithm=..."
        expiresIn:
          type: integer
          description: Presigned URL expiration time in seconds (typically 900 = 15 minutes)
          example: 900
        key:
          type: string
          description: Object key to reference this upload in subsequent requests
