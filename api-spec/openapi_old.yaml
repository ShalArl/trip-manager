openapi: 3.0.0
info:
  title: Trip Manager API
  description: API for managing trips, locations, and travel itineraries
  version: 3.0.0
  contact:
    name: Trip Manager Team

servers:
  - url: http://localhost:8000/api
    description: Development server
  - url: https://api.trip-manager.com
    description: Production server

security:
  - bearerAuth: []

paths:

  # ─── Authentication ────────────────────────────────────────────────────────
  /users/provision:
    post:
      summary: Provision internal user record for authenticated Firebase user
      description: |
        Creates an internal user record for a user that has authenticated with Firebase
        but does not yet exist in the application's database. Must be called after a
        successful Firebase sign-up or sign-in before any other authenticated API calls.

        Idempotent: if the user already exists (matched by Firebase UID), the existing
        record is returned with 200 OK. If a new record is created, 201 Created is returned.

        The request body is optional. If provided, fields override the values extracted
        from the Firebase token claims (e.g., to set a custom display name different
        from the one in the Firebase profile).
      operationId: provisionMe
      tags:
        - users
      security:
        - firebaseAuth: [ ]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProvisionUserRequest'
      responses:
        '200':
          description: User was already provisioned; existing record returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '201':
          description: User was newly provisioned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Missing or invalid Firebase token
        '500':
          description: Internal server error

 # ─── Uploads ────────────────────────────────────────────────────────────────

  /uploads/presigned:
    post:
       summary: Get a presigned URL for direct file upload
       description: >
         Request a presigned URL to upload files directly to S3/MinIO without routing through the backend.
         Presigned URLs are valid for 15 minutes and can be used with PUT requests to upload files directly.
       operationId: getPresignedUrl
       tags:
         - Uploads
       requestBody:
         required: true
         content:
           application/json:
             schema:
               $ref: '#/components/schemas/PresignedURLRequest'
       responses:
         '200':
           description: Presigned URL generated successfully
           content:
             application/json:
               schema:
                 $ref: '#/components/schemas/PresignedURLResponse'
         '400':
           description: Invalid mediaType or missing required fields
         '401':
           description: Unauthorized
         '500':
           description: Failed to generate presigned URL

 # ─── User Profile ──────────────────────────────────────────────────────────

  /users/me:
    get:
      summary: Get current user profile
      operationId: getMe
      tags:
        - Users
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Unauthorized
    put:
       summary: Update current user profile
       description: >
         Update user profile with profile information.
         To upload a profile avatar: (1) Request a presigned URL via POST /uploads/presigned,
         (2) upload the file directly to the presigned URL,
       operationId: updateMe
       tags:
         - Users
       requestBody:
         required: true
         content:
           application/json:
             schema:
               $ref: '#/components/schemas/UpdateUserRequest'
       responses:
         '200':
           description: Profile updated
           content:
             application/json:
               schema:
                 $ref: '#/components/schemas/UserResponse'
         '400':
           description: Invalid input
         '401':
           description: Unauthorized

 # ─── Trips ────────────────────────────────────────────────────────────────

  /trips:
    get:
      summary: List all trips created by the current user
      operationId: listTrips
      tags:
        - Trips
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Paginated list of trips
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripListResponse'
        '401':
          description: Unauthorized

    post:
      summary: Create a new trip
      operationId: createTrip
      tags:
        - Trips
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTripRequest'
      responses:
        '201':
          description: Trip created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripResponse'
        '400':
          description: Invalid input
        '401':
          description: Unauthorized

  /trips/{tripId}:
    get:
      summary: Get trip details
      operationId: getTrip
      tags:
        - Trips
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Trip details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden – trip belongs to another user
        '404':
          description: Trip not found

    put:
      summary: Update trip
      operationId: updateTrip
      tags:
        - Trips
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTripRequest'
      responses:
        '200':
          description: Trip updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Trip not found

    delete:
      summary: Delete trip
      operationId: deleteTrip
      tags:
        - Trips
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Trip deleted
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Trip not found

