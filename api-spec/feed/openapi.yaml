openapi: 3.0.0
info:
  title: Feed Service API
  version: 1.0.0

servers:
  - url: http://localhost:8007/api
    description: Development server

paths:
  /feed:
    get:
      summary: Get activity feed
      operationId: getFeed
      tags: [feed]
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        '200':
          description: Paginated feed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FeedResponse' }

components:
  schemas:
    FeedTrip:
      type: object
      required: [tripId, title, createdAt, creatorId, likes, comments, score]
      properties:
        tripId:
          type: string
          format: uuid
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        creatorId:
          type: string
          format: uuid
        likes:
          type: integer
          format: int64
        comments:
          type: integer
          format: int64
        score:
          type: number
          format: float

    FeedResponse:
      type: object
      required: [data, total, limit, offset]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/FeedTrip' }
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer