openapi: 3.0.0
info:
  title: Social Service API
  version: 1.0.0

servers:
  - url: http://localhost:8003/api
    description: Development server

security:
  - firebaseAuth: [ ]

paths:

  # ── Trip Likes ───────────────────────────────────────────────────────────────

  /trips/{tripId}/likes:
    get:
      summary: Get like count and like status for a trip
      operationId: getTripLikes
      tags: [ social ]
      parameters:
        - name: tripId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Like info
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TripLikeResponse' }
    post:
      summary: Like a trip
      operationId: likeTrip
      tags: [ social ]
      parameters:
        - name: tripId
          in: path
          required: true
          schema: { type: string }
      responses:
        '201':
          description: Trip liked
        '401':
          description: Unauthorized
        '409':
          description: Already liked
    delete:
      summary: Unlike a trip
      operationId: unlikeTrip
      tags: [ social ]
      parameters:
        - name: tripId
          in: path
          required: true
          schema: { type: string }
      responses:
        '204':
          description: Trip unliked
        '401':
          description: Unauthorized
        '404':
          description: Like not found

  # ── Trip Comments ────────────────────────────────────────────────────────────

  /trips/{tripId}/comments:
    get:
      summary: List comments for a trip
      operationId: listTripComments
      tags: [ social ]
      parameters:
        - name: tripId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: List of comments
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TripCommentListResponse' }
    post:
      summary: Add a comment to a trip
      operationId: createTripComment
      tags: [ social ]
      parameters:
        - name: tripId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateTripCommentRequest' }
      responses:
        '201':
          description: Comment created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TripCommentResponse' }
        '401':
          description: Unauthorized

  /trips/{tripId}/comments/{commentId}:
    delete:
      summary: Delete a comment
      operationId: deleteTripComment
      tags: [ social ]
      parameters:
        - name: tripId
          in: path
          required: true
          schema: { type: string }
        - name: commentId
          in: path
          required: true
          schema: { type: string }
      responses:
        '204':
          description: Comment deleted
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Comment not found

  /uploads/presigned:
    post:
      summary: Get a presigned URL for direct file upload
      description: >
        Request a presigned URL to upload files directly to S3/MinIO without routing through the backend.
        Presigned URLs are valid for 15 minutes and can be used with PUT requests to upload files directly.
      operationId: getPresignedUrl
      tags:
        - Uploads
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PresignedURLRequest'
      responses:
        '200':
          description: Presigned URL generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresignedURLResponse'
        '400':
          description: Invalid mediaType or missing required fields
        '401':
          description: Unauthorized
        '500':
          description: Failed to generate presigned URL

components:
  securitySchemes:
    firebaseAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    UserSummary:
      type: object
      required: [ id, name, email ]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        avatarUrl:
          type: string
          nullable: true

    TripLikeResponse:
      type: object
      required: [ likeCount, hasLiked ]
      properties:
        likeCount:
          type: integer
        hasLiked:
          type: boolean

    CreateTripCommentRequest:
      type: object
      required: [ text ]
      properties:
        text:
          type: string

    TripCommentResponse:
      type: object
      required: [ id, tripId, user, text, createdAt, updatedAt ]
      properties:
        id:
          type: string
        tripId:
          type: string
        user:
          $ref: '#/components/schemas/UserSummary'
        text:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TripCommentListResponse:
      type: object
      required: [ data ]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TripCommentResponse'

    PresignedURLRequest:
      description: Request for a presigned URL to upload files directly to S3/MinIO
      type: object
      required:
        - fileName
        - mediaType
      properties:
        fileName:
          type: string
          description: Name of the file to upload (e.g., "avatar.jpg")
          example: avatar.jpg
        mediaType:
          type: string
          enum: [ avatar, trip, location, activity ]
          description: Type of media being uploaded

    PresignedURLResponse:
      description: Presigned URL response for direct file uploads
      type: object
      required:
        - presignedUrl
        - expiresIn
        - key
      properties:
        presignedUrl:
          type: string
          format: uri
          description: URL that can be used to upload the file directly to S3/MinIO
          example: "http://minio:9000/trip-manager/avatars/user-id.jpg?X-Amz-Algorithm=..."
        expiresIn:
          type: integer
          description: Presigned URL expiration time in seconds (typically 900 = 15 minutes)
          example: 900
        key:
          type: string
          description: Object key to reference this upload in subsequent requests