      description: Request for a presigned URL to upload files directly to S3/MinIO
      type: object
      required:
        - fileName
        - mediaType
      properties:
        fileName:
          type: string
          description: 'Name of the file to upload (e.g., "avatar.jpg")'
          example: avatar.jpg
        mediaType:
          type: string
          enum:
            - avatar
            - trip
            - location
            - activity
          description: Type of media being uploaded
    PresignedURLResponse:
      description: Presigned URL response for direct file uploads
      type: object
      required:
        - presignedUrl
        - expiresIn
        - key
      properties:
        presignedUrl:
          type: string
          format: uri
          description: URL that can be used to upload the file directly to S3/MinIO
          example: >-
            http://minio:9000/trip-manager/avatars/user-id.jpg?X-Amz-Algorithm=...
        expiresIn:
          type: integer
          description: >-
            Presigned URL expiration time in seconds (typically 900 = 15
            minutes)
          example: 900
        key:
          type: string
          description: Object key to reference this upload in subsequent requests
