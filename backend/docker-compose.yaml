services:
  # ── Infrastruktur ────────────────────────────────────────────────────────────

  firebase:
    build:
      context: ../firebase
      dockerfile: Dockerfile
    container_name: trip_manager_firebase
    ports:
      - "4000:4000"   # Emulator UI
      - "8080:8080"   # Firestore
      - "9099:9099"   # Auth
    volumes:
      - ../firebase:/firebase
      - firebase_data:/firebase/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  minio:
    image: quay.io/minio/minio:latest
    container_name: trip_manager_minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: quay.io/minio/minio:latest
    container_name: trip_manager_minio_init
    restart: on-failure
    entrypoint: /bin/sh
    command: /minio-init.sh
    environment:
      S3_BUCKET: ${S3_BUCKET:-trip-manager}
      S3_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    volumes:
      - ../docker/minio-init.sh:/minio-init.sh
    depends_on:
      minio:
        condition: service_healthy

  # ── Datenbanken ──────────────────────────────────────────────────────────────

  users-db:
    image: postgres:16-alpine
    container_name: trip_manager_users_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: users_db
    volumes:
      - users_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  trips-db:
    image: postgres:16-alpine
    container_name: trip_manager_trips_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: trips_db
    volumes:
      - trips_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  locations-db:
    image: postgres:16-alpine
    container_name: trip_manager_locations_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: locations_db
    volumes:
      - locations_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Services ─────────────────────────────────────────────────────────────────

  auth:
    build:
      context: .
      dockerfile: auth/Dockerfile
    container_name: trip_manager_auth
    restart: always
    ports:
      - "8082:8082"
    environment:
      PORT: 8082
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-trip-manager-local}
      FIREBASE_AUTH_EMULATOR_HOST: firebase:9099
    depends_on:
      firebase:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  users:
    build:
      context: .
      dockerfile: users/Dockerfile
    container_name: trip_manager_users
    restart: always
    ports:
      - "8001:8001"
    environment:
      PORT: 8001
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@users-db:5432/users_db?sslmode=disable
      AUTH_SERVICE_URL: http://auth:8082
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-trip-manager-local}
    depends_on:
      users-db:
        condition: service_healthy
      auth:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  social:
    build:
      context: .
      dockerfile: social/Dockerfile
    container_name: trip_manager_social
    restart: always
    ports:
      - "8003:8003"
    environment:
      PORT: 8003
      AUTH_SERVICE_URL: http://auth:8082
      FIRESTORE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-trip-manager-local}
      FIRESTORE_EMULATOR_HOST: firebase:8080
    depends_on:
      firebase:
        condition: service_healthy
      auth:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  presigner:
    build:
      context: .
      dockerfile: presigner/Dockerfile
    container_name: trip_manager_presigner
    restart: always
    ports:
      - "8004:8004"
    environment:
      PORT: 8004
      AUTH_SERVICE_URL: http://auth:8082
      STORAGE_TYPE: ${STORAGE_TYPE:-s3}
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-trip-manager}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
    depends_on:
      minio:
        condition: service_healthy
      auth:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
  nginx:
    image: nginx:alpine
    container_name: trip_manager_gateway
    ports:
      - "8000:8000"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth
      - users
      - social
      - presigner

volumes:
  users_db_data:
  trips_db_data:
  locations_db_data:
  minio_data:
  firebase_data: