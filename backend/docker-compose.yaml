services:
  # ── Infrastruktur ────────────────────────────────────────────────────────────

  firebase:
    build:
      context: ../firebase
      dockerfile: Dockerfile
    container_name: trip_manager_firebase
    stop_grace_period: 60s
    ports:
      - "4000:4000"   # Emulator UI
      - "8080:8080"   # Firestore
      - "9099:9099"   # Auth
    volumes:
      - ../firebase:/firebase
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  minio:
    image: quay.io/minio/minio:latest
    container_name: trip_manager_minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: quay.io/minio/minio:latest
    container_name: trip_manager_minio_init
    restart: on-failure
    entrypoint: /bin/sh
    command: /minio-init.sh
    environment:
      S3_BUCKET: ${S3_BUCKET:-trip-manager}
      S3_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    volumes:
      - ../docker/minio-init.sh:/minio-init.sh
    depends_on:
      minio:
        condition: service_healthy

  # ── Message Broker ───────────────────────────────────────────────────────────

  kafka:
    image: apache/kafka:3.7.0
    container_name: trip_manager_kafka
    restart: always
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "trip-manager-kafka-cluster"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Graph Datenbank ──────────────────────────────────────────────────────────

  neo4j:
    image: neo4j:5.19-community
    container_name: trip_manager_neo4j
    restart: always
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-neo4jpassword}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Mail (lokal) ─────────────────────────────────────────────────────────────

  mailhog:
    image: mailhog/mailhog:latest
    container_name: trip_manager_mailhog
    restart: always
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8025 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Datenbanken ──────────────────────────────────────────────────────────────

  users-db:
    image: postgres:16-alpine
    container_name: trip_manager_users_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: users_db
    volumes:
      - users_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  trips-db:
    image: postgres:16-alpine
    container_name: trip_manager_trips_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: trips_db
    volumes:
      - trips_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  locations-db:
    image: postgres:16-alpine
    container_name: trip_manager_locations_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: locations_db
    volumes:
      - locations_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  newsletter-db:
    image: postgres:16-alpine
    container_name: trip_manager_newsletter_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: newsletter_db
    volumes:
      - newsletter_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Services ─────────────────────────────────────────────────────────────────

  auth:
    build:
      context: .
      dockerfile: auth/Dockerfile
    container_name: trip_manager_auth
    restart: always
    ports:
      - "8082:8082"
    environment:
      PORT: 8082
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-trip-manager-local}
      FIREBASE_AUTH_EMULATOR_HOST: firebase:9099
    depends_on:
      firebase:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  users:
    build:
      context: .
      dockerfile: users/Dockerfile
    container_name: trip_manager_users
    restart: always
    ports:
      - "8001:8001"
    environment:
      PORT: 8001
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@users-db:5432/users_db?sslmode=disable
      AUTH_SERVICE_URL: http://auth:8082
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-trip-manager-local}
    depends_on:
      users-db:
        condition: service_healthy
      auth:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  social:
    build:
      context: .
      dockerfile: social/Dockerfile
    container_name: trip_manager_social
    restart: always
    ports:
      - "8003:8003"
    environment:
      PORT: 8003
      AUTH_CLIENT_CONNECTION_STRING: http://auth:8082
      FIRESTORE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-trip-manager-local}
      FIRESTORE_EMULATOR_HOST: firebase:8080
      USERS_SERVICE_URL: http://users:8001
      KAFKA_BROKERS: kafka:9092
    depends_on:
      firebase:
        condition: service_healthy
      auth:
        condition: service_healthy
      users:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  presigner:
    build:
      context: .
      dockerfile: presigner/Dockerfile
    container_name: trip_manager_presigner
    restart: always
    ports:
      - "8004:8004"
    environment:
      PORT: 8004
      AUTH_SERVICE_URL: http://auth:8082
      STORAGE_TYPE: ${STORAGE_TYPE:-s3}
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-trip-manager}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
    depends_on:
      minio:
        condition: service_healthy
      auth:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  trips:
    build:
      context: .
      dockerfile: trips/Dockerfile
    container_name: trip_manager_trips
    restart: always
    ports:
      - "8002:8002"
    environment:
      PORT: 8002
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@trips-db:5432/trips_db?sslmode=disable
      AUTH_SERVICE_URL: http://auth:8082
      USERS_SERVICE_URL: http://users:8001
      KAFKA_BROKERS: kafka:9092
    depends_on:
      trips-db:
        condition: service_healthy
      auth:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  locations:
    build:
      context: .
      dockerfile: locations/Dockerfile
    container_name: trip_manager_locations
    restart: always
    ports:
      - "8005:8005"
    environment:
      PORT: 8005
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@locations-db:5432/locations_db?sslmode=disable
      AUTH_SERVICE_URL: http://auth:8082
      USERS_SERVICE_URL: http://users:8001
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-trip-manager}
    depends_on:
      locations-db:
        condition: service_healthy
      auth:
        condition: service_healthy
      users:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  feed:
    build:
      context: .
      dockerfile: feed/Dockerfile
    container_name: trip_manager_feed
    restart: always
    ports:
      - "8007:8007"
    environment:
      PORT: 8007
      AUTH_CLIENT_CONNECTION_STRING: http://auth:8082
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4jpassword}
    depends_on:
      neo4j:
        condition: service_healthy
      auth:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8007/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  newsletter:
    build:
      context: .
      dockerfile: newsletter/Dockerfile
    container_name: trip_manager_newsletter
    restart: always
    ports:
      - "8008:8008"
    environment:
      PORT: 8008
      AUTH_SERVICE_URL: http://auth:8082
      NEWSLETTER_DB_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@newsletter-db:5432/newsletter_db?sslmode=disable
    depends_on:
      newsletter-db:
        condition: service_healthy
      auth:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8008/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Workers ──────────────────────────────────────────────────────────────────

  feed-generator:
    build:
      context: .
      dockerfile: feed-generator/Dockerfile
    container_name: trip_manager_feed_generator
    restart: always
    environment:
      KAFKA_BROKERS: kafka:9092
      KAFKA_GROUP_ID: feed-generator
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4jpassword}
    depends_on:
      kafka:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  newsletter-worker:
    build:
      context: .
      dockerfile: newsletter-worker/Dockerfile
    container_name: trip_manager_newsletter_worker
    restart: always
    environment:
      USERS_DB_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@users-db:5432/users_db?sslmode=disable
      NEWSLETTER_DB_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@newsletter-db:5432/newsletter_db?sslmode=disable
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4jpassword}
      CRON_SCHEDULE: "*/2 * * * *"
    depends_on:
      users-db:
        condition: service_healthy
      newsletter-db:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  # ── Gateway ──────────────────────────────────────────────────────────────────

  nginx:
    image: nginx:alpine
    container_name: trip_manager_gateway
    ports:
      - "8000:8000"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth
      - users
      - social
      - presigner
      - trips
      - locations
      - feed
      - newsletter

volumes:
  users_db_data:
  trips_db_data:
  locations_db_data:
  newsletter_db_data:
  minio_data:
  kafka_data:
  neo4j_data: