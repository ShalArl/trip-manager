events {
    worker_connections 1024;
}

http {
    upstream auth {
        server auth:8082;
    }
    upstream users {
        server users:8001;
    }
    upstream social {
        server social:8003;
    }
    upstream presigner {
        server presigner:8004;
    }

    server {
        listen 8000;

        # Users
        location /api/users/ {
            proxy_pass http://users;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Social
        location /api/trips/ {
            proxy_pass http://social;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Presigner
        location /api/uploads/ {
            proxy_pass http://presigner;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Auth
        location /api/auth/ {
            proxy_pass http://auth;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Health
        location /health {
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }
    }
}