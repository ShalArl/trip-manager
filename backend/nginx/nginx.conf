events {
    worker_connections 1024;
}

http {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    upstream auth      { server auth:8082; }
    upstream users     { server users:8001; }
    upstream trips     { server trips:8002; }
    upstream social    { server social:8003; }
    upstream presigner { server presigner:8004; }

    server {
        listen 8000;

        # --- ZENTRALE CORS EINSTELLUNGEN ---
        # Gilt für alle Locations, es sei denn, sie überschreiben es.
        add_header 'Access-Control-Allow-Origin' 'http://localhost:3000' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
        add_header 'Access-Control-Max-Age' 1728000 always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # --- ROUTING ---

        location /api/users {
            rewrite ^/api/users/?(.*)$ /$1 break;
            proxy_pass http://users;
        }

        location /api/trips {
            rewrite ^/api/trips/?(.*)$ /$1 break;
            proxy_pass http://trips;
        }

        location /api/uploads/ {
            proxy_pass http://presigner;
        }

        location /api/auth/ {
            proxy_pass http://auth;
        }

        location /api/social/ {
            proxy_pass http://social;
        }

        location /health {
            add_header Content-Type application/json;
            return 200 '{"status":"ok"}';
        }
    }
}