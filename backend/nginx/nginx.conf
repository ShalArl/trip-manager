            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Newsletter ───────────────────────────────────────────────────────────
        # newsletter registriert volle Pfade /api/newsletter → kein rewrite
        location = /api/newsletter {
            if ($request_method = 'OPTIONS') {
