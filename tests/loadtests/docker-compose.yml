version: '3.8'

services:
  locust-master:
    build: .
    ports:
      - "8089:8089"  # Web UI
      - "5557:5557"  # Communication between master and workers
    environment:
      - API_URL=http://backend:8000/api
    command: >
      -f locustfile.py
      --host http://backend:8000/api
      --master
      -u 100
      -r 10
      -t 5m
      --web
    depends_on:
      - backend
    networks:
      - trip-manager

  locust-worker-1:
    build: .
    environment:
      - API_URL=http://backend:8000/api
    command: >
      -f locustfile.py
      --host http://backend:8000/api
      --worker
      --master-host=locust-master
    depends_on:
      - locust-master
      - backend
    networks:
      - trip-manager

  locust-worker-2:
    build: .
    environment:
      - API_URL=http://backend:8000/api
    command: >
      -f locustfile.py
      --host http://backend:8000/api
      --worker
      --master-host=locust-master
    depends_on:
      - locust-master
      - backend
    networks:
      - trip-manager

  backend:
    # Reference to your backend service
    # Update this to match your actual backend configuration
    image: ghcr.io/your-org/trip-manager/backend:latest
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://user:password@postgres:5432/trip_manager
      - JWT_SECRET=test-secret-key
      - SERVER_PORT=8000
    networks:
      - trip-manager

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=trip_manager
    ports:
      - "5432:5432"
    networks:
      - trip-manager

networks:
  trip-manager:
    driver: bridge

