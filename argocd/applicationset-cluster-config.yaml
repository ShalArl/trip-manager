apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: trip-manager-cluster-config
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/ShalArl/trip-manager.git
        revision: gitops-prod
        directories:
          - path: gitops/prod/cluster-config
  template:
    metadata:
      name: 'cluster-config'
      namespace: argocd
      annotations:
        argocd.argoproj.io/sync-wave: "1"
    spec:
      project: default
      source:
        repoURL: https://github.com/ShalArl/trip-manager.git
        targetRevision: gitops-prod
        path: '{{path}}'
        directory:
          recurse: true
      destination:
        server: https://kubernetes.default.svc
        namespace: external-secrets
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true