name: Build & Push Docker Images

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Detect which services have changes
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v4
        id: changes
        with:
           filters: |
             backend:
               - 'backend/**'
               - 'api-spec/**'
               - '.github/workflows/deploy-iaas.yaml'
               - 'deploy/hetzner/deployment/**'
               - 'docker/**'
             frontend:
               - 'frontend/**'
               - 'api-spec/**'
               - '.github/workflows/deploy-iaas.yaml'
               - 'deploy/hetzner/deployment/**'
               - 'docker/**'

  # Build and push backend image if changes detected
  build-backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Debug - Print output
        run: echo "Backend changes detected, proceeding with build"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/backend
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
  # Build and push frontend image if changes detected
  build-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Debug - Print output
        run: echo "Frontend changes detected, proceeding with build"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/frontend
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL != '' && secrets.NEXT_PUBLIC_API_URL || 'http://localhost:8000' }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
  # Summary job
  summary:
    runs-on: ubuntu-latest
    needs: [detect-changes, build-backend, build-frontend]
    if: always()
    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.build-backend.result }}" = "skipped" ] && [ "${{ needs.build-frontend.result }}" = "skipped" ]; then
            echo "✓ No changes detected - skipping builds"
          else
            echo "✓ Build pipeline completed"
            echo "Backend build: ${{ needs.build-backend.result }}"
            echo "Frontend build: ${{ needs.build-frontend.result }}"
          fi

  # Deploy to Server (only after push to main/dev with successful builds)
  deploy:
    needs: [detect-changes, summary]
    if: >
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev') &&
      (needs.detect-changes.outputs.backend == 'true' || 
       needs.detect-changes.outputs.frontend == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup SSH Key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_DEPLOY_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -p ${{ secrets.SERVER_PORT }} -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy deploy files to server
        env:
          DOMAIN: ${{ secrets.DOMAIN }}
        run: |
           # Copy main files
           scp -P ${{ secrets.SERVER_PORT }} \
             deploy/hetzner/deployment/deploy.sh \
             docker-compose.yaml \
             ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/home/${{ secrets.SERVER_USER }}/app/cloud/
           
           # Copy docker directory with initialization scripts
           scp -P ${{ secrets.SERVER_PORT }} \
             docker/minio-init.sh \
             ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/home/${{ secrets.SERVER_USER }}/app/cloud/docker/
           
           # Make all scripts executable
           ssh -p ${{ secrets.SERVER_PORT }} \
             ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
             "chmod +x /home/${{ secrets.SERVER_USER }}/app/cloud/deploy.sh && chmod +x /home/${{ secrets.SERVER_USER }}/app/cloud/docker/*.sh"
           
           # Replace placeholders in Caddyfile and copy to server
           envsubst < deploy/hetzner/deployment/Caddyfile > deploy/hetzner/Caddyfile.final
           
           scp -P ${{ secrets.SERVER_PORT }} \
             deploy/hetzner/Caddyfile.final \
             ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/home/${{ secrets.SERVER_USER }}/app/cloud/
           
           # Rename Caddyfile on server
           ssh -p ${{ secrets.SERVER_PORT }} \
             ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
             "mv /home/${{ secrets.SERVER_USER }}/app/cloud/Caddyfile.final /home/${{ secrets.SERVER_USER }}/app/cloud/Caddyfile"

      - name: Generate .env file
        run: |
          ssh -p ${{ secrets.SERVER_PORT }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            tee /home/${{ secrets.SERVER_USER }}/app/cloud/.env << 'EOF'
          GHCR_USERNAME=${{ secrets.GHCR_USERNAME }}
          GHCR_PAT=${{ secrets.GHCR_PAT }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_NAME=${{ secrets.DB_NAME }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          DOMAIN=${{ secrets.DOMAIN }}
          S3_ENDPOINT=${{ secrets.S3_ENDPOINT || 'http://minio:9000' }}
          S3_BUCKET=${{ secrets.S3_BUCKET || 'trip-manager' }}
          S3_REGION=${{ secrets.S3_REGION || 'us-east-1' }}
          S3_ACCESS_KEY=${{ secrets.S3_ACCESS_KEY || 'minioadmin' }}
          S3_SECRET_KEY=${{ secrets.S3_SECRET_KEY || 'minioadmin' }}
          S3_PUBLIC_URL=${{ secrets.S3_PUBLIC_URL || 'https://{DOMAIN}/minio' }}
          S3_USE_SSL=${{ secrets.S3_USE_SSL || 'false' }}
          EOF

      - name: Execute deploy script on server
        run: |
          ssh -p ${{ secrets.SERVER_PORT }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "chmod +x /home/${{ secrets.SERVER_USER }}/app/cloud/deploy.sh && cd /home/${{ secrets.SERVER_USER }}/app/cloud && ./deploy.sh"

      - name: Verify deployment
        run: |
          ssh -p ${{ secrets.SERVER_PORT }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "docker-compose -f /home/${{ secrets.SERVER_USER }}/app/cloud/docker-compose.yaml ps"
