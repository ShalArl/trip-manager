name: Build & Push Docker Images

on:
  pull_request:
    types: [ opened, synchronize, reopened ]
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Detect which services have changes
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'api-spec/**'
              - '.github/workflows/deploy-iaas.yaml'
              - 'deploy/hetzner/deployment/**'
              - 'docker/**'
            frontend:
              - 'frontend/**'
              - 'api-spec/**'
              - '.github/workflows/deploy-iaas.yaml'
              - 'deploy/hetzner/deployment/**'
              - 'docker/**'

  # Build and push backend image if changes detected
  build-backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate to Google Cloud
        id: gcp-auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}
          token_format: access_token

      - name: Log in to Artifact Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.GCP_AR_HOST }}
          username: oauth2accesstoken
          password: ${{ steps.gcp-auth.outputs.access_token }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.REGISTRY }}/${{ github.repository }}/backend
            ${{ vars.GCP_AR_HOST }}/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_AR_REPO }}/backend
          tags: |
            type=ref,event=branch
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  # Build and push frontend image (hetzner) if changes detected
  build-frontend-hetzner:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/frontend
          tags: |
            type=ref,event=branch
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL_HETZNER || 'http://localhost:8000' }}
            NEXT_PUBLIC_S3_PUBLIC_URL=${{ secrets.NEXT_PUBLIC_S3_PUBLIC_URL_HETZNER || 'http://localhost/minio' }}
          cache-from: type=gha,scope=frontend-hetzner
          cache-to: type=gha,mode=max,scope=frontend-hetzner

  build-frontend-gcp:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4

      - name: Authenticate to Google Cloud
        id: gcp-auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}
          token_format: access_token

      - name: Log in to Artifact Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.GCP_AR_HOST }}
          username: oauth2accesstoken
          password: ${{ steps.gcp-auth.outputs.access_token }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ vars.GCP_AR_HOST }}/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_AR_REPO }}/frontend
          tags: |
            type=ref,event=branch
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL_GCP || 'https://placeholder.invalid' }}
            NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
            NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          cache-from: type=gha,scope=frontend-gcp
          cache-to: type=gha,mode=max,scope=frontend-gcp

  # Summary job
  summary:
    runs-on: ubuntu-latest
    needs: [ detect-changes, build-backend, build-frontend-gcp, build-frontend-hetzner ]
    if: always()
    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.build-backend.result }}" = "skipped" ] && [ "${{ needs.build-frontend-gcp.result }}" = "skipped" ] && [ "${{ needs.build-frontend-hetzner.result }}" = "skipped" ]; then
            echo "✓ No changes detected - skipping builds"
          else
            echo "✓ Build pipeline completed"
            echo "Backend build: ${{ needs.build-backend.result }}"
            echo "Frontend build: ${{ needs.build-frontend-gcp.result }}" || echo "Frontend build: ${{ needs.build-frontend-hetzner.result }}"
          fi

  # Deploy to Server (only after push to main/dev with successful builds)
  # Only if tag hetzner-release is set as currently hetzner deployment is not fully setup for Auth with firebase
  deploy-hetzner:
    needs: [ detect-changes, summary ]
    if: >
      github.event_name == 'push' && (github.ref == 'refs/tags/hetzner-release') &&
      (needs.build-backend.result == 'success' || needs.build-backend.result == 'skipped') &&
      (needs.build-frontend-hetzner.result == 'success' || needs.build-frontend-hetzner.result == 'skipped') &&
      (needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.frontend == 'true')

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup SSH Key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_DEPLOY_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -p ${{ secrets.SERVER_PORT }} -H "${{ secrets.SERVER_HOST }}"
          >> ~/.ssh/known_hosts

      - name: Create remote directories
        run: |
          ssh -p ${{ secrets.SERVER_PORT }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "mkdir -p /home/${{ secrets.SERVER_USER }}/app/cloud/{docker,logs}"

      - name: Copy deploy files to server
        env:
          DOMAIN: ${{ secrets.DOMAIN }}
        run: |
          # Copy main files
          scp -P ${{ secrets.SERVER_PORT }} \
            deploy/hetzner/deployment/deploy.sh \
            docker-compose.yaml \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/home/${{ secrets.SERVER_USER }}/app/cloud/

          # Copy docker directory with initialization scripts
          scp -P ${{ secrets.SERVER_PORT }} \
            docker/minio-init.sh \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/home/${{ secrets.SERVER_USER }}/app/cloud/docker/

          # Make all scripts executable
          ssh -p ${{ secrets.SERVER_PORT }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "chmod +x /home/${{ secrets.SERVER_USER }}/app/cloud/deploy.sh && chmod +x /home/${{ secrets.SERVER_USER }}/app/cloud/docker/*.sh"

          # Replace placeholders in Caddyfile and copy to server
          envsubst < deploy/hetzner/deployment/Caddyfile > deploy/hetzner/Caddyfile.final

          scp -P ${{ secrets.SERVER_PORT }} \
            deploy/hetzner/Caddyfile.final \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/home/${{ secrets.SERVER_USER }}/app/cloud/

          # Rename Caddyfile on server
          ssh -p ${{ secrets.SERVER_PORT }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "mv /home/${{ secrets.SERVER_USER }}/app/cloud/Caddyfile.final /home/${{ secrets.SERVER_USER }}/app/cloud/Caddyfile"

      - name: Generate .env file
        run: |
          ssh -p ${{ secrets.SERVER_PORT }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            tee /home/${{ secrets.SERVER_USER }}/app/cloud/.env << 'EOF'
          GHCR_USERNAME=${{ secrets.GHCR_USERNAME }}
          GHCR_PAT=${{ secrets.GHCR_PAT }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_NAME=${{ secrets.DB_NAME }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          DOMAIN=${{ secrets.DOMAIN }}
          S3_ENDPOINT=${{ secrets.S3_ENDPOINT || 'http://minio:9000' }}
          S3_BUCKET=${{ secrets.S3_BUCKET || 'trip-manager' }}
          S3_REGION=${{ secrets.S3_REGION || 'us-east-1' }}
          S3_ACCESS_KEY=${{ secrets.S3_ACCESS_KEY || 'minioadmin' }}
          S3_SECRET_KEY=${{ secrets.S3_SECRET_KEY || 'minioadmin' }}
          S3_PUBLIC_URL=${{ secrets.S3_PUBLIC_URL }}
          S3_USE_SSL=${{ secrets.S3_USE_SSL || 'false' }}
          EOF

      - name: Execute deploy script on server
        run: |
          ssh -p ${{ secrets.SERVER_PORT }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "chmod +x /home/${{ secrets.SERVER_USER }}/app/cloud/deploy.sh && cd /home/${{ secrets.SERVER_USER }}/app/cloud && ./deploy.sh"

      - name: Verify Hetzner deployment
        run: |
          ssh -p ${{ secrets.SERVER_PORT }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "docker-compose -f /home/${{ secrets.SERVER_USER }}/app/cloud/docker-compose.yaml ps"

  deploy-gcp:
    needs: [detect-changes, summary]
    if: >
      always() &&
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev') &&
      (needs.build-backend.result == 'success' || needs.build-backend.result == 'skipped') &&
      (needs.build-frontend-gcp.result == 'success' || needs.build-frontend-gcp.result == 'skipped') &&
      (needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.frontend == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Update Backend Image
        if: needs.detect-changes.outputs.backend == 'true'
        run: |
          gcloud run services update ${{ vars.GCP_BACKEND_SERVICE }} \
            --image=${{ vars.GCP_AR_HOST }}/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_AR_REPO }}/backend:sha-${{ github.sha }} \
            --region=${{ vars.GCP_REGION }} \
            --project=${{ vars.GCP_PROJECT_ID }}

      - name: Update Frontend Image
        if: needs.detect-changes.outputs.frontend == 'true'
        run: |
          gcloud run services update ${{ vars.GCP_FRONTEND_SERVICE }} \
            --image=${{ vars.GCP_AR_HOST }}/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_AR_REPO }}/frontend:sha-${{ github.sha }} \
            --region=${{ vars.GCP_REGION }} \
            --project=${{ vars.GCP_PROJECT_ID }}