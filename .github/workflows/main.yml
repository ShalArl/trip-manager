name: Dynamic Microservice CI/CD
on:
  push:
    branches:
      - dev
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild all services'
        type: boolean
        default: false

jobs:
  discover-services:
    runs-on: ubuntu-latest
    outputs:
      backend-matrix: ${{ steps.set-matrix.outputs.matrix }}
      backend-changed: ${{ steps.set-matrix.outputs.changed }}
      frontend-changed: 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set build matrix
        id: set-matrix
        run: |
          command -v jq >/dev/null || (sudo apt-get update && sudo apt-get install -y jq)

          services=$(find backend -mindepth 1 -maxdepth 1 -type d | xargs -I{} basename {})

          matrix=$(jq -n '{include: []}')
          has_services=false

          for service in $services; do
            { [ "$service" = "shared" ] || [ "$service" = "nginx" ]; } && continue

            if [ ! -f "backend/$service/go.mod" ] || [ ! -f "backend/$service/Dockerfile" ]; then
              echo "⏭️ Skipping $service (no go.mod or Dockerfile)"
              continue
            fi

            echo "✅ $service"
            matrix=$(echo "$matrix" | jq ".include += [{\"service\": \"$service\"}]")
            has_services=true
          done

          echo "Final matrix: $matrix"
          {
            echo "matrix<<EOF"
            echo "$matrix"
            echo "EOF"
            echo "changed=$has_services"
          } >> "$GITHUB_OUTPUT"

  build-backend:
    needs: [ discover-services ]
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 3
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-services.outputs.backend-matrix) }}
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4

      - name: Install oapi-codegen CLI
        run: go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@latest

      - name: Add GOPATH to PATH
        run: echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Run code generation
        run: pnpm gen

      - name: Authenticate to Google Cloud
        id: gcp-auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}
          token_format: access_token

      - name: Log in to Artifact Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.GCP_AR_HOST }}
          username: oauth2accesstoken
          password: ${{ steps.gcp-auth.outputs.access_token }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ vars.GCP_AR_HOST }}/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_AR_REPO }}/backend/${{ matrix.service }}
          tags: |
            type=sha,format=long
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend-${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=backend-${{ matrix.service }}

  build-frontend:
    needs: [ discover-services ]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4

      - name: Authenticate to Google Cloud
        id: gcp-auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}
          token_format: access_token

      - name: Log in to Artifact Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.GCP_AR_HOST }}
          username: oauth2accesstoken
          password: ${{ steps.gcp-auth.outputs.access_token }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ vars.GCP_AR_HOST }}/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_AR_REPO }}/frontend
          tags: |
            type=sha,format=long
            type=ref,event=branch

      - name: Set API URL based on branch
        id: api-url
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "url=${{ vars.NEXT_PUBLIC_API_URL_GCP }}" >> $GITHUB_OUTPUT
          else
            echo "url=${{ vars.NEXT_PUBLIC_API_STAGING_URL_GCP }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ steps.api-url.outputs.url }}
            NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
            NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          cache-from: type=gha,scope=frontend

  deploy:
    needs: [ build-backend, build-frontend ]
    if: always() && needs.build-backend.result == 'success' && needs.build-frontend.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Set environment and image tag
        id: ctx
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            ENV="prod"
          else
            ENV="staging"
          fi
          SHA="${{ github.sha }}"
          TAG="sha-${SHA}"
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "image_tag=$TAG" >> $GITHUB_OUTPUT
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "Deploying SHA: $SHA to $ENV"

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ctx.outputs.sha }}
          path: source

      - name: Checkout gitops branch
        uses: actions/checkout@v4
        with:
          ref: gitops-prod
          path: gitops-repo

      - name: Install Helmfile
        run: |
          HELMFILE_VERSION=$(curl -s https://api.github.com/repos/helmfile/helmfile/releases/latest | grep tag_name | cut -d'"' -f4)
          HELMFILE_VERSION_CLEAN=${HELMFILE_VERSION#v}
          curl -fsSL "https://github.com/helmfile/helmfile/releases/download/${HELMFILE_VERSION}/helmfile_${HELMFILE_VERSION_CLEAN}_linux_amd64.tar.gz" \
            | tar xz helmfile
          sudo mv helmfile /usr/local/bin/
          helmfile version

      - name: Install Helm plugins
        run: |
          helm plugin install https://github.com/databus23/helm-diff || true

      - name: Render manifests
        env:
          IMAGE_TAG: ${{ steps.ctx.outputs.image_tag }}
          ENVIRONMENT: ${{ steps.ctx.outputs.environment }}
        working-directory: source
        run: |
          rm -rf ../gitops-repo/gitops/$ENVIRONMENT
          mkdir -p ../gitops-repo/gitops/$ENVIRONMENT
          helmfile -e $ENVIRONMENT \
            --state-values-set imageTag=$IMAGE_TAG \
            template --output-dir-template "../gitops-repo/gitops/$ENVIRONMENT/{{.Release.Name}}"

      - name: Commit and push rendered manifests
        env:
          ENVIRONMENT: ${{ steps.ctx.outputs.environment }}
          IMAGE_TAG: ${{ steps.ctx.outputs.image_tag }}
          SOURCE_SHA: ${{ steps.ctx.outputs.sha }}
        working-directory: gitops-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gitops/$ENVIRONMENT
          if git diff --staged --quiet; then
            echo "No changes to deploy"
          else
            git commit -m "deploy(${ENVIRONMENT}): ${IMAGE_TAG} (source ${SOURCE_SHA})"
            git push origin gitops-prod
          fi