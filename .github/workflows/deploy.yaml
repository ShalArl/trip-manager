name: Build & Push Docker Images

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Detect which services have changes
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'api-spec/**'
              - '.github/workflows/deploy.yaml'
            frontend:
              - 'frontend/**'
              - 'api-spec/**'
              - '.github/workflows/deploy.yaml'

  # Build and push backend image
  build-backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    uses: ./.github/workflows/docker-build.yml
    with:
      service: backend
      context: ./backend

  # Build and push frontend image
  build-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    uses: ./.github/workflows/docker-build.yml
    with:
      service: frontend
      context: ./frontend
      build-args: |
        NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL != '' && secrets.NEXT_PUBLIC_API_URL || 'http://localhost:8000' }}

  # Summary job
  summary:
    runs-on: ubuntu-latest
    needs: [detect-changes, build-backend, build-frontend]
    if: always()
    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.build-backend.result }}" = "skipped" ] && [ "${{ needs.build-frontend.result }}" = "skipped" ]; then
            echo "✓ No changes detected - skipping builds"
          else
            echo "✓ Build pipeline completed"
            echo "Backend build: ${{ needs.build-backend.result }}"
            echo "Frontend build: ${{ needs.build-frontend.result }}"
          fi

  # Deploy to Hetzner (only after push to main/dev with successful builds)
  deploy:
    needs: [detect-changes, summary]
    if: >
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev') &&
      (needs.detect-changes.outputs.backend == 'true' || 
       needs.detect-changes.outputs.frontend == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.HETZNER_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy deploy files to server
        run: |
          scp -i ~/.ssh/deploy_key \
            -P ${{ secrets.HETZNER_PORT }} \
            -r deploy/hetzner/deploy.sh \
            deploy/hetzner/generate-env.sh \
            docker-compose.yaml \
            ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}:/app/cloud/
          
          # Copy Caddyfile to /etc/caddy/
          scp -i ~/.ssh/deploy_key \
            -P ${{ secrets.HETZNER_PORT }} \
            deploy/hetzner/Caddyfile \
            ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}:/etc/caddy/Caddyfile

      - name: Generate .env file from secrets
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DOMAIN: ${{ secrets.DOMAIN }}
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p ${{ secrets.HETZNER_PORT }} \
            ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }} \
            "cd /app/cloud && GHCR_USERNAME='$GHCR_USERNAME' GHCR_PAT='$GHCR_PAT' DB_USER='$DB_USER' DB_PASSWORD='$DB_PASSWORD' DB_NAME='$DB_NAME' JWT_SECRET='$JWT_SECRET' DOMAIN='$DOMAIN' bash generate-env.sh"

      - name: Make script executable
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p ${{ secrets.HETZNER_PORT }} \
            ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }} \
            "chmod +x /app/cloud/deploy.sh"

      - name: Execute deploy script on server
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p ${{ secrets.HETZNER_PORT }} \
            ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }} \
            "cd /app/cloud && ./deploy.sh"

      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p ${{ secrets.HETZNER_PORT }} \
            ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }} \
            "docker-compose -f /app/cloud/docker-compose.yaml ps"

      - name: Cleanup SSH key
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key

