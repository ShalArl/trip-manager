# .github/workflows/deploy.yml
name: Deploy to GKE

on:
  workflow_run:
    workflows: ["Dynamic Microservice CI/CD"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        type: choice
        options: [prod, dev]
        default: prod
      image_tag:
        description: 'Image tag to deploy (leave empty for latest successful)'
        type: string

jobs:
  prepare:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.ctx.outputs.sha }}
      environment: ${{ steps.ctx.outputs.environment }}
      image_tag: ${{ steps.ctx.outputs.image_tag }}
    steps:
      - name: Extract context
        id: ctx
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
            TAG="${{ github.event.inputs.image_tag }}"
            SHA="${{ github.sha }}"
            # Falls kein Tag angegeben, SHA des aktuellen Commits verwenden
            if [ -z "$TAG" ]; then
              TAG="sha-${SHA}"
            fi
          else
            ENV="prod"
            SHA="${{ github.event.workflow_run.head_sha }}"
            TAG="sha-${SHA}"
          fi

          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "image_tag=$TAG" >> $GITHUB_OUTPUT

          echo "Deploying SHA: $SHA"
          echo "Environment: $ENV"
          echo "Image Tag: $TAG"

  deploy:
    needs: prepare
    runs-on: ubuntu-latest
    environment: ${{ needs.prepare.outputs.environment }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Authenticate to Google Cloud
        id: gcp-auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v3
        with:
          cluster_name: ${{ vars.GKE_CLUSTER }}
          location: ${{ vars.GKE_REGION }}

      - name: Install Helmfile
        run: |
          curl -fsSL https://github.com/helmfile/helmfile/releases/latest/download/helmfile_linux_amd64.tar.gz \
            | tar xz
          sudo mv helmfile /usr/local/bin/
          helmfile version

      - name: Install Helm plugins
        run: |
          helm plugin install https://github.com/databus23/helm-diff || true

      - name: Deploy
        env:
          IMAGE_TAG: ${{ needs.prepare.outputs.image_tag }}
          ENVIRONMENT: ${{ needs.prepare.outputs.environment }}
        run: |
          helmfile -e $ENVIRONMENT \
            --state-values-set imageTag=$IMAGE_TAG \
            sync