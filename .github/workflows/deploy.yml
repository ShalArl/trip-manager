# .github/workflows/deploy.yml
name: Deploy to GKE

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        type: choice
        options: [ prod, staging ]
        default: prod
      image_tag:
        description: 'Image tag to deploy (leave empty for latest successful)'
        type: string

jobs:
  prepare:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.ctx.outputs.sha }}
      environment: ${{ steps.ctx.outputs.environment }}
      image_tag: ${{ steps.ctx.outputs.image_tag }}
    steps:
      - name: Extract context
        id: ctx
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
            TAG="${{ github.event.inputs.image_tag }}"
            SHA="${{ github.sha }}"
            if [ -z "$TAG" ]; then
              TAG="sha-${SHA}"
            fi
          else
            BRANCH="${{ github.event.workflow_run.head_branch }}"
            if [ "$BRANCH" = "main" ]; then
              ENV="prod"
            else
              ENV="staging"
            fi
            SHA="${{ github.event.workflow_run.head_sha }}"
            TAG="sha-${SHA}"
          fi
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "image_tag=$TAG" >> $GITHUB_OUTPUT
          echo "Deploying SHA: $SHA"
          echo "Environment: $ENV"
          echo "Image Tag: $TAG"

  deploy:
    needs: prepare
    runs-on: ubuntu-latest
    environment: ${{ needs.prepare.outputs.environment }}
    permissions:
      contents: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          path: source

      - name: Checkout gitops branch
        uses: actions/checkout@v4
        with:
          ref: gitops-prod
          path: gitops-repo

      - name: Install Helmfile
        run: |
          HELMFILE_VERSION=$(curl -s https://api.github.com/repos/helmfile/helmfile/releases/latest | grep tag_name | cut -d'"' -f4)
          HELMFILE_VERSION_CLEAN=${HELMFILE_VERSION#v}
          curl -fsSL "https://github.com/helmfile/helmfile/releases/download/${HELMFILE_VERSION}/helmfile_${HELMFILE_VERSION_CLEAN}_linux_amd64.tar.gz" \
            | tar xz helmfile
          sudo mv helmfile /usr/local/bin/
          helmfile version

      - name: Install Helm plugins
        run: |
          helm plugin install https://github.com/databus23/helm-diff || true

      - name: Render manifests
        env:
          IMAGE_TAG: ${{ needs.prepare.outputs.image_tag }}
          ENVIRONMENT: ${{ needs.prepare.outputs.environment }}
        working-directory: source
        run: |
          rm -rf ../gitops-repo/gitops/$ENVIRONMENT
          mkdir -p ../gitops-repo/gitops/$ENVIRONMENT
          helmfile -e $ENVIRONMENT \
            --state-values-set imageTag=$IMAGE_TAG \
            template --output-dir-template "../gitops-repo/gitops/$ENVIRONMENT/{{.Release.Name}}"

      - name: Commit and push rendered manifests
        env:
          ENVIRONMENT: ${{ needs.prepare.outputs.environment }}
          IMAGE_TAG: ${{ needs.prepare.outputs.image_tag }}
          SOURCE_SHA: ${{ needs.prepare.outputs.sha }}
        working-directory: gitops-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gitops/$ENVIRONMENT
          if git diff --staged --quiet; then
            echo "No changes to deploy"
          else
            git commit -m "deploy(${ENVIRONMENT}): ${IMAGE_TAG} (source ${SOURCE_SHA})"
            git push origin gitops-prod
          fi