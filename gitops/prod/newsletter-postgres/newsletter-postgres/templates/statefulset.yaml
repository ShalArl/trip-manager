---
# Source: newsletter-postgres/templates/statefulset.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: newsletter-postgres
  namespace: trip-manager-prod
spec:
  serviceName: newsletter-postgres
  replicas: 1
  selector:
    matchLabels:
      app: newsletter-postgres
  template:
    metadata:
      labels:
        app: newsletter-postgres
    spec:
      containers:
        - name: newsletter-postgres
          image: "postgres:16-alpine"
          env:
            - name: POSTGRES_DB
              value: newsletter
            - name: POSTGRES_USER
              value: newsletter
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: newsletter-postgres-secret
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: postgres
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        storageClassName: standard-rwo
        resources:
          requests:
            storage: 8Gi
