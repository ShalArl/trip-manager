---
# Source: presigner/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: presigner
  namespace: trip-manager-prod
  labels:
    app.kubernetes.io/name: presigner
    app.kubernetes.io/instance: presigner
    app.kubernetes.io/version: "dev"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: trip-manager
  annotations:
    cloud.google.com/backend-config: "{\"default\": \"presigner-backend-config\"}"
spec:
  type: ClusterIP
  ports:
    - port: 8085
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: presigner
    app.kubernetes.io/instance: presigner
---
# Source: presigner/templates/service.yaml
apiVersion: networking.gke.io/v1
kind: HealthCheckPolicy
metadata:
  name: presigner-hc-policy
  namespace: trip-manager-prod
  labels:
    app.kubernetes.io/name: presigner
    app.kubernetes.io/instance: presigner
    app.kubernetes.io/version: "dev"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: trip-manager
spec:
  default:
    config:
      type: HTTP
      httpHealthCheck:
        port: 8085
        requestPath: /health
  targetRef:
    group: ""
    kind: Service
    name: presigner

