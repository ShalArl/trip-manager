---
# Source: weather-info/templates/externalsecrets.yaml
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: weather-info-secrets
  namespace: trip-manager-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-store
    kind: ClusterSecretStore
  target:
    name: weather-info-secrets
  data:
    - secretKey: REDIS_URL
      remoteRef:
        key: redis-url
    - secretKey: LOCATIONS_DB_URL
      remoteRef:
        key: locations-database-url

