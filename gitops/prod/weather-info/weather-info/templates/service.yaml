---
# Source: weather-info/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: weather-info
  namespace: trip-manager-prod
  labels:
    app.kubernetes.io/name: weather-info
    app.kubernetes.io/instance: weather-info
    app.kubernetes.io/version: "dev"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: trip-manager
  annotations:
    cloud.google.com/backend-config: "{\"default\": \"weather-info-backend-config\"}"
spec:
  type: ClusterIP
  ports:
    - port: 8088
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: weather-info
    app.kubernetes.io/instance: weather-info
---
# Source: weather-info/templates/service.yaml
apiVersion: networking.gke.io/v1
kind: HealthCheckPolicy
metadata:
  name: weather-info-hc-policy
  namespace: trip-manager-prod
  labels:
    app.kubernetes.io/name: weather-info
    app.kubernetes.io/instance: weather-info
    app.kubernetes.io/version: "dev"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: trip-manager
spec:
  default:
    config:
      type: HTTP
      httpHealthCheck:
        port: 8088
        requestPath: /health
  targetRef:
    group: ""
    kind: Service
    name: weather-info

