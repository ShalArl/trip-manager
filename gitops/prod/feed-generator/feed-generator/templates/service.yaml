---
# Source: feed-generator/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: feed-generator
  namespace: trip-manager-prod
  labels:
    app.kubernetes.io/name: feed-generator
    app.kubernetes.io/instance: feed-generator
    app.kubernetes.io/version: "dev"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: trip-manager
  annotations:
    cloud.google.com/backend-config: "{\"default\": \"feed-generator-backend-config\"}"
spec:
  type: ClusterIP
  ports:
    - port: 8090
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: feed-generator
    app.kubernetes.io/instance: feed-generator
---
# Source: feed-generator/templates/service.yaml
apiVersion: networking.gke.io/v1
kind: HealthCheckPolicy
metadata:
  name: feed-generator-hc-policy
  namespace: trip-manager-prod
  labels:
    app.kubernetes.io/name: feed-generator
    app.kubernetes.io/instance: feed-generator
    app.kubernetes.io/version: "dev"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: trip-manager
spec:
  default:
    config:
      type: HTTP
      httpHealthCheck:
        port: 8090
        requestPath: /health
  targetRef:
    group: ""
    kind: Service
    name: feed-generator
