---
# Source: locations-postgres/templates/externalsecret.yaml
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: locations-postgres-secret
  namespace: trip-manager-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-store
    kind: ClusterSecretStore
  target:
    name: locations-postgres-secret
  data:
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: locations-postgres-password
