---
# Source: auth/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: trip-manager-staging
  labels:
    app.kubernetes.io/name: auth
    app.kubernetes.io/instance: auth
    app.kubernetes.io/version: "sha-0e286a04d815dbfa24ed6851383b9e76713d4dc5"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: trip-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: auth
      app.kubernetes.io/instance: auth
  template:
    metadata:
      labels: 
        app.kubernetes.io/name: auth
        app.kubernetes.io/instance: auth
      annotations:
        checksum/config: f11ec93ce1e651f1f958af7e1cd88d1c11d23a47986e426e19ae8b0bdde02e94
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: auth
          image: "europe-west1-docker.pkg.dev/project-32c60644-299b-4b05-8cf/trip-manager/backend/auth:sha-0e286a04d815dbfa24ed6851383b9e76713d4dc5"
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
              name: http
              protocol: TCP
          env: 
            - name: PORT
              value: "8082"
            - name: LOG_LEVEL
              value: info
            - name: CORS_ALLOWED_ORIGINS
              value: https://staging.neatnode.xyz,https://www.staging.neatnode.xyz
            - name: OTEL_COLLECTOR_ENDPOINT
              value: otel-collector.trip-manager-staging.svc.cluster.local:4317
          envFrom: 
            - secretRef:
                name: auth-secrets
          resources: 
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
      serviceAccountName: auth
