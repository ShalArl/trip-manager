---
# Source: newsletter/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: newsletter
  namespace: trip-manager-staging
  labels:
    app.kubernetes.io/name: newsletter
    app.kubernetes.io/instance: newsletter
    app.kubernetes.io/version: "sha-5e9e9f730d723d5d574d529b268bb19ae7e26518"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: trip-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: newsletter
      app.kubernetes.io/instance: newsletter
  template:
    metadata:
      labels: 
        app.kubernetes.io/name: newsletter
        app.kubernetes.io/instance: newsletter
      annotations:
        checksum/config: 3f6d836fc7feee27b7eafee435e778431ab1d31359b6863e600b54ae8d3f7362
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: newsletter
          image: "europe-west1-docker.pkg.dev/project-32c60644-299b-4b05-8cf/trip-manager/backend/newsletter:sha-5e9e9f730d723d5d574d529b268bb19ae7e26518"
          imagePullPolicy: Always
          ports:
            - containerPort: 8070
              name: http
              protocol: TCP
          env: 
            - name: PORT
              value: "8070"
            - name: LOG_LEVEL
              value: info
            - name: AUTH_SERVICE_URL
              value: http://auth.trip-manager-staging.svc.cluster.local:8082
            - name: CORS_ALLOWED_ORIGINS
              value: https://staging.neatnode.xyz
            - name: OTEL_COLLECTOR_ENDPOINT
              value: otel-collector.trip-manager-staging.svc.cluster.local:4317
          envFrom: 
            - secretRef:
                name: newsletter-secrets
          resources: 
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
      serviceAccountName: newsletter
