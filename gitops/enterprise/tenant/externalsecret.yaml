apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: trips-postgres-tenant-secret
  namespace: trip-manager-tenant
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: gcp-secret-store
  target:
    name: trips-postgres-tenant-secret
  data:
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: enterprise-tenant-db-password
