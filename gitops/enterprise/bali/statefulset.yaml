apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: trips-postgres-bali
  namespace: trip-manager-bali
spec:
  serviceName: trips-postgres-bali
  replicas: 1
  selector:
    matchLabels:
      app: trips-postgres
      tenant: bali
  template:
    metadata:
      labels:
        app: trips-postgres
        tenant: bali
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          args: ["-c", "hba_file=/etc/postgresql/pg_hba.conf"]
          env:
            - name: POSTGRES_DB
              value: trips
            - name: POSTGRES_USER
              value: trips_enterprise
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trips-postgres-bali-secret
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: postgres
            - name: config
              mountPath: /etc/postgresql
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: trips-postgres-bali-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard-rwo
        resources:
          requests:
            storage: 5Gi
