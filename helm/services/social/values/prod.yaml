replicaCount: 1

service:
  healthPath: /health

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 2

env:
  - name: PORT
    value: "8081"
  - name: LOG_LEVEL
    value: "info"
  - name: FIRESTORE_PROJECT_ID
    value: "project-32c60644-299b-4b05-8cf"
  - name: AUTH_CLIENT_CONNECTION_STRING
    value: "http://auth.trip-manager-prod.svc.cluster.local:8082"
  - name: USERS_SERVICE_URL
    value: "http://users.trip-manager-prod.svc.cluster.local:8083"
  - name: KAFKA_BROKERS
    value: "kafka.trip-manager-prod.svc.cluster.local:9092"

serviceAccount:
  gcpServiceAccount: "social-sa@project-32c60644-299b-4b05-8cf.iam.gserviceaccount.com"