replicaCount: 1

service:
  healthPath: /health

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

env:
  - name: PORT
    value: "8071"
  - name: LOG_LEVEL
    value: "info"

externalSecrets:
  enabled: true
  secrets:
    - secretKey: NEO4J_URI
      remoteKey: neo4j-url
    - secretKey: NEO4J_USER
      remoteKey: neo4j-user
    - secretKey: NEO4J_PASSWORD
      remoteKey: neo4j-password
    - secretKey: NEWSLETTER_DB_URL
      remoteKey: newsletter-postgres-url

envFrom:
  - secretRef:
      name: newsletter-worker-secrets

serviceAccount:
  gcpServiceAccount: "newsletter-worker-sa@project-32c60644-299b-4b05-8cf.iam.gserviceaccount.com"