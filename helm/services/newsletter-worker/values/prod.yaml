replicaCount: 1

service:
  healthPath: /health

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi
env:
  - name: PORT
    value: "8071"
  - name: LOG_LEVEL
    value: "info"
  - name: RUN_MODE
    value: "oneshot"

externalSecrets:
  enabled: true
  secrets:
    - secretKey: NEO4J_URI
      remoteKey: neo4j-url
    - secretKey: NEO4J_USERNAME
      remoteKey: neo4j-username
    - secretKey: NEO4J_PASSWORD
      remoteKey: neo4j-password
    - secretKey: NEWSLETTER_DB_URL
      remoteKey: newsletter-postgres-url
    - secretKey: USERS_DB_URL
      remoteKey: users-database-url

envFrom:
  - secretRef:
      name: newsletter-worker-secrets

serviceAccount:
  gcpServiceAccount: "newsletter-worker-sa@project-32c60644-299b-4b05-8cf.iam.gserviceaccount.com"