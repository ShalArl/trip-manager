image:
  pullPolicy: Never

replicaCount: 1

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

hpa:
  enabled: false

env:
  - name: PORT
    value: "8087"
  - name: LOG_LEVEL
    value: "debug"
  - name: API_URL
    value: "https://www.auswaertiges-amt.de/opendata/travelwarning"
  - name: REDIS_URL
    value: "redis://redis-master.trip-manager-dev.svc.cluster.local:6379"
  - name: CORS_ALLOWED_ORIGINS
    value: "http://localhost:3000"