ingress:
  enabled: true
  className: nginx
  host: ""

routes:
  auth:
    service: auth
    port: 8082
    path: /api/auth
  presigner:
    service: presigner
    port: 8085
    path: /api/presign
  social:
    service: social
    port: 8081
    path: /api/social
  frontend:
    service: frontend
    port: 3000
    path: /