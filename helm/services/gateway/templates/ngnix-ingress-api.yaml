{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: trip-manager-ingress-api
  namespace: {{ .Release.Namespace }}
  annotations:
    {{- if eq .Values.ingress.className "nginx" }}
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "http://localhost:3000"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, PATCH, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, Content-Type"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - http:
        paths:
          - path: {{ .Values.routes.auth.path }}(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ .Values.routes.auth.service }}
                port:
                  number: {{ .Values.routes.auth.port }}
          - path: {{ .Values.routes.social.path }}(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ .Values.routes.social.service }}
                port:
                  number: {{ .Values.routes.social.port }}
          - path: {{ .Values.routes.users.path }}(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ .Values.routes.users.service }}
                port:
                  number: {{ .Values.routes.users.port }}
          - path: {{ .Values.routes.trips.path }}(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ .Values.routes.trips.service }}
                port:
                  number: {{ .Values.routes.trips.port }}
          - path: {{ .Values.routes.travelInfo.path }}(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ .Values.routes.travelInfo.service }}
                port:
                  number: {{ .Values.routes.travelInfo.port }}
          - path: {{ .Values.routes.feed.path }}(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ .Values.routes.feed.service }}
                port:
                  number: {{ .Values.routes.feed.port }}
          - path: {{ .Values.routes.newsletter.path }}(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ .Values.routes.newsletter.service }}
                port:
                  number: {{ .Values.routes.newsletter.port }}
{{- end }}