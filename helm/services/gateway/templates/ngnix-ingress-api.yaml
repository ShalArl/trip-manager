{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: trip-manager-ingress-api
  namespace: {{ .Release.Namespace }}
  annotations:
    {{- if eq .Values.ingress.className "nginx" }}
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "http://192.168.49.2"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, PATCH, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, Content-Type"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - http:
        paths:
          - path: {{ .Values.routes.auth.path }}(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ .Values.routes.auth.service }}
                port:
                  number: {{ .Values.routes.auth.port }}
          - path: {{ .Values.routes.presigner.path }}(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ .Values.routes.presigner.service }}
                port:
                  number: {{ .Values.routes.presigner.port }}
          - path: {{ .Values.routes.social.path }}(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ .Values.routes.social.service }}
                port:
                  number: {{ .Values.routes.social.port }}
          - path: {{ .Values.routes.users.path }}(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ .Values.routes.users.service }}
                port:
                  number: {{ .Values.routes.users.port }}
          - path: {{ .Values.routes.trips.path }}(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ .Values.routes.trips.service }}
                port:
                  number: {{ .Values.routes.trips.port }}
          - path: {{ .Values.routes.locations.path }}(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ .Values.routes.locations.service }}
                port:
                  number: {{ .Values.routes.locations.port }}
          - path: {{ .Values.routes.travelWarning.path }}(/|$)(.*)
            backend:
              service:
                name: {{ .Values.routes.travelWarning.service }}
                port:
                  number: {{ .Values.routes.travelWarning.port }}
          - path: {{ .Values.routes.weatherInfo.path }}(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ .Values.routes.weatherInfo.service }}
                port:
                  number: {{ .Values.routes.weatherInfo.port }}
         {{- end }}