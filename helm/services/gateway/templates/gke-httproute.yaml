{{- if eq .Values.ingress.className "gke-l7-global-external-managed" }}
# API Routes
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: trip-manager-api-route
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: trip-manager-gateway
  hostnames:
    - {{ .Values.ingress.apiHost }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/auth/
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: {{ .Values.routes.auth.service }}
          port: {{ .Values.routes.auth.port }}
    - matches:
        - path:
            type: PathPrefix
            value: /api/users/
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: {{ .Values.routes.users.service }}
          port: {{ .Values.routes.users.port }}
    - matches:
        - path:
            type: PathPrefix
            value: /api/social/
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: {{ .Values.routes.social.service }}
          port: {{ .Values.routes.social.port }}
    - matches:
        - path:
            type: PathPrefix
            value: /api/trips/
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: {{ .Values.routes.trips.service }}
          port: {{ .Values.routes.trips.port }}
    - matches:
        - path:
            type: PathPrefix
            value: /api/info/
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /info/
      backendRefs:
        - name: {{ .Values.routes.travelInfo.service }}
          port: {{ .Values.routes.travelInfo.port }}
    - matches:
        - path:
            type: PathPrefix
            value: /api/feed/
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: {{ .Values.routes.feed.service }}
          port: {{ .Values.routes.feed.port }}
    - matches:
        - path:
            type: PathPrefix
            value: /api/tenants/
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /tenants/
      backendRefs:
        - name: {{ .Values.routes.tenants.service }}
          port: {{ .Values.routes.tenants.port }}
    - matches:
        - path:
            type: PathPrefix
            value: /api/newsletter/
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /tenants/
      backendRefs:
        - name: {{ .Values.routes.newsletter.service }}
          port: {{ .Values.routes.newsletter.port }}
---
# Frontend Route
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: trip-manager-frontend-route
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: trip-manager-gateway
  hostnames:
    - {{ .Values.ingress.host }}
    - www.{{ .Values.ingress.host }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ .Values.routes.frontend.service }}
          port: {{ .Values.routes.frontend.port }}
{{- end }}