    cpu: 800m
    memory: 1Gi
  requests:
    cpu: 200m
    memory: 256Mi

hpa:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPU: 70
  targetMemory: 80

env: [ ]
envFrom: [ ]

externalSecrets:
  enabled: false
  secrets: [ ]

serviceAccount:
  gcpServiceAccount: ""