image:
  repository: ""
  tag: ""
  pullPolicy: Always

service:
  port: 8088

replicaCount: 1

probes:
  liveness: /health
  readiness: /health

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 2
  targetCPU: 70
  targetMemory: 80

env:
  - name: PORT
    value: "8088"
  - name: LOG_LEVEL
    value: "info"

envFrom: []

serviceAccount:
  gcpServiceAccount: ""

externalSecrets:
  enabled: false
  secrets: []

cronjob:
  schedule: "0 6 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1