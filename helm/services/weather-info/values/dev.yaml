replicaCount: 1

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

hpa:
  enabled: false

env:
  - name: PORT
    value: "8088"
  - name: LOG_LEVEL
    value: "debug"
  - name: API_URL
    value: "https://api.open-meteo.com/v1/forecast"
  - name: REDIS_URL
    value: "redis://redis-master.trip-manager-dev.svc.cluster.local:6379"
  - name: LOCATIONS_DB_URL
    value: "postgres://locations:locations@locations-postgres.trip-manager-dev.svc.cluster.local:5432/locations?sslmode=disable"
  - name: FORECAST_DAYS
    value: "3"
  - name: CACHE_TTL_HOURS
    value: "25"
  - name: CORS_ALLOWED_ORIGINS
    value: "http://localhost:3000"