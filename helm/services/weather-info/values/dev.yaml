env:
  - name: PORT
    value: "8088"
  - name: LOG_LEVEL
    value: "debug"
  - name: REDIS_URL
    value: "redis://redis-master.trip-manager-dev.svc.cluster.local:6379"
  - name: LOCATIONS_DB_URL
    value: "postgres://locations:locations@locations-postgres.trip-manager-dev.svc.cluster.local:5432/locations?sslmode=disable"
  - name: FORECAST_DAYS
    value: "3"
  - name: CACHE_TTL_HOURS
    value: "25"
  - name: CORS_ALLOWED_ORIGINS
    value: "*"