image:
  repository: ""
  tag: ""
  pullPolicy: IfNotPresent

service:
  port: 8086

replicaCount: 1

probes:
  liveness: /health
  readiness: /health

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPU: 70
  targetMemory: 80

env:
  - name: PORT
    value: "8086"
  - name: LOG_LEVEL
    value: "info"

envFrom: []

serviceAccount:
  gcpServiceAccount: ""