image:
  repository: ""
  tag: ""
  pullPolicy: Always

service:
  port: 8090
  healthPath: /health

probes:
  liveness: /health
  readiness: /health

replicaCount: 1

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPU: 70
  targetMemory: 80

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

env:
  - name: PORT
    value: "8090"
  - name: GCP_PROJECT_ID
    value: "project-32c60644-299b-4b05-8cf"
  - name: PUBSUB_SUBSCRIPTION_ID
    value: "trip-events-sub"