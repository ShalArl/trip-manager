image:
  repository: ""
  tag: ""
  pullPolicy: Always

service:
  port: 8089
  healthPath: /health

replicaCount: 1

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

env:
  - name: PORT
    value: "8089"
  - name: AUTH_CLIENT_CONNECTION_STRING
    value: "http://auth.trip-manager-prod.svc.cluster.local:8082"