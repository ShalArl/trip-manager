replicaCount: 1

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

hpa:
  enabled: false

env:
  - name: PORT
    value: "8089"
  - name: AUTH_CLIENT_CONNECTION_STRING
    value: "http://auth.trip-manager-dev.svc.cluster.local:8082"
  - name: NEO4J_URI
    value: "bolt://neo4j.trip-manager-dev.svc.cluster.local:7687"
  - name: NEO4J_USERNAME
    value: "neo4j"
  - name: NEO4J_PASSWORD
    value: "neo4jpassword"
  - name: LOG_LEVEL
    value: "debug"