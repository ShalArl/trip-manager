image:
  pullPolicy: Always

service:
  healthPath: /health

env:
  - name: PORT
    value: "8089"
  - name: AUTH_SERVICE_URL
    value: "http://auth.trip-manager-staging.svc.cluster.local:8082"
  - name: CORS_ALLOWED_ORIGINS
    value: "https://staging.neatnode.xyz,https://www.staging.neatnode.xyz"
  - name: OTEL_COLLECTOR_ENDPOINT
    value: "otel-collector.trip-manager-staging.svc.cluster.local:4317"
  - name: GCP_PROJECT_ID
    value: "project-32c60644-299b-4b05-8cf"
  - name: PUBSUB_SUBSCRIPTION_ID
    value: "trip-events-sub"

externalSecrets:
  enabled: true
  secrets:
    - secretKey: NEO4J_URI
      remoteKey: neo4j-url
    - secretKey: NEO4J_USERNAME
      remoteKey: neo4j-username
    - secretKey: NEO4J_PASSWORD
      remoteKey: neo4j-password

envFrom:
  - secretRef:
      name: feed-secrets

serviceAccount:
  gcpServiceAccount: "feed-sa@project-32c60644-299b-4b05-8cf.iam.gserviceaccount.com"