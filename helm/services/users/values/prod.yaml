image:
  pullPolicy: Always

replicaCount: 1

service:
  healthPath: /health

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 64Mi

hpa:
  enabled: false

env:
  - name: PORT
    value: "8083"
  - name: LOG_LEVEL
    value: "info"
  - name: AUTH_SERVICE_URL
    value: "http://auth.trip-manager-prod.svc.cluster.local:8082"
  - name: STORAGE_BUCKET_URL
    value: "https://storage.googleapis.com/trip-manager-bucket"
  - name: CORS_ALLOWED_ORIGINS
    value: "https://neatnode.xyz,https://www.neatnode.xyz"
  - name: OTEL_COLLECTOR_ENDPOINT
    value: "otel-collector.trip-manager-prod.svc.cluster.local:4317"
  - name: GCP_PROJECT_ID
    value: "project-32c60644-299b-4b05-8cf"

externalSecrets:
  enabled: true
  secrets:
    - secretKey: MIGRATION_URL
      remoteKey: users-migration-url
    - secretKey: DATABASE_URL
      remoteKey: users-database-url
    - secretKey: APP_DB_PASSWORD
      remoteKey: users-app-database-password

envFrom:
  - secretRef:
      name: users-secrets

serviceAccount:
  gcpServiceAccount: "users-sa@project-32c60644-299b-4b05-8cf.iam.gserviceaccount.com"