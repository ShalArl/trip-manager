image:
  repository: ""
  tag: ""

service:
  port: 8083

replicaCount: 1

probes:
  liveness: /health
  readiness: /health

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPU: 70
  targetMemory: 80

env:
  - name: PORT
    value: "8083"
  - name: LOG_LEVEL
    value: "info"
  - name: AUTH_SERVICE_URL
    value: "http://auth.trip-manager.svc.cluster.local:8082"

envFrom: []

serviceAccount:
  gcpServiceAccount: ""

externalSecrets:
  enabled: false
  secrets: []