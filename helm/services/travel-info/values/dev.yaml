image:
  pullPolicy: Never

replicaCount: 1

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

hpa:
  enabled: false

env:
  - name: PORT
    value: "8087"
  - name: LOG_LEVEL
    value: "debug"
  - name: AUTH_SERVICE_URL
    value: "http://auth.trip-manager-dev.svc.cluster.local:8082"
  - name: REDIS_URL
    value: "redis://redis-master.trip-manager-dev.svc.cluster.local:6379"
  - name: TRAVEL_API_URL
    value: "https://www.auswaertiges-amt.de/opendata/travelwarning"
  - name: WEATHER_API_URL
    value: "https://api.open-meteo.com/v1/forecast"
  - name: FORECAST_DAYS
    value: "3"
  - name: CACHE_TTL_HOURS
    value: "25"
  - name: CORS_ALLOWED_ORIGINS
    value: "http://localhost:3000"
  - name: OTEL_COLLECTOR_ENDPOINT
    value: "otel-collector.trip-manager-dev.svc.cluster.local:4317"

serviceAccount:
  gcpServiceAccount: ""