image:
  pullPolicy: Always

replicaCount: 1

service:
  healthPath: /health

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

hpa:
  enabled: false

env:
  - name: PORT
    value: "8087"
  - name: LOG_LEVEL
    value: "info"
  - name: AUTH_SERVICE_URL
    value: "http://auth.trip-manager-prod.svc.cluster.local:8082"
  - name: TRAVEL_API_URL
    value: "https://www.auswaertiges-amt.de/opendata/travelwarning"
  - name: WEATHER_API_URL
    value: "https://api.open-meteo.com/v1/forecast"
  - name: FORECAST_DAYS
    value: "3"
  - name: CACHE_TTL_HOURS
    value: "25"
  - name: CORS_ALLOWED_ORIGINS
    value: "https://staging.neatnode.xyz,https://www.staging.neatnode.xyz"
  - name: OTEL_COLLECTOR_ENDPOINT
    value: "otel-collector.trip-manager-prod.svc.cluster.local:4317"

externalSecrets:
  enabled: true
  secrets:
    - secretKey: REDIS_URL
      remoteKey: redis-url

envFrom:
  - secretRef:
      name: travel-info-secrets

serviceAccount:
  gcpServiceAccount: "travel-info-sa@project-32c60644-299b-4b05-8cf.iam.gserviceaccount.com"