replicaCount: 1

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

hpa:
  enabled: false

env:
  - name: PORT
    value: "8082"
  - name: LOG_LEVEL
    value: "debug"
  - name: FIREBASE_PROJECT_ID
    value: "trip-manager-local"
  - name: FIREBASE_AUTH_EMULATOR_HOST
    value: "firebase-emulator:9099"