image:
  pullPolicy: Always

replicaCount: 1

service:
  healthPath: /health

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

hpa:
  enabled: false

env:
  - name: PORT
    value: "8082"
  - name: LOG_LEVEL
    value: "info"
  - name: CORS_ALLOWED_ORIGINS
    value: "https://staging.neatnode.xyz,https://www.staging.neatnode.xyz"
  - name: OTEL_COLLECTOR_ENDPOINT
    value: "otel-collector.trip-manager-staging.svc.cluster.local:4317"

externalSecrets:
  enabled: true
  secrets:
    - secretKey: FIREBASE_PROJECT_ID
      remoteKey: auth-firebase-project-id

envFrom:
  - secretRef:
      name: auth-secrets

serviceAccount:
  gcpServiceAccount: "auth-sa@project-32c60644-299b-4b05-8cf.iam.gserviceaccount.com"

