replicaCount: 1

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

hpa:
  enabled: false

env:
  - name: PORT
    value: "8085"
  - name: LOG_LEVEL
    value: "info"
  - name: STORAGE_PROVIDER
    value: "s3"
  - name: S3_ENDPOINT
    value: "http://host.docker.internal:9000"
  - name: STORAGE_BUCKET
    value: "my-bucket"
  - name: S3_REGION
    value: "us-east-1"
  - name: S3_ACCESS_KEY
    value: "minioadmin"
  - name: S3_SECRET_KEY
    value: "minioadmin"
  - name: S3_USE_SSL
    value: "false"