image:
  pullPolicy: Always

replicaCount: 1

service:
  healthPath: /health

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 2

env:
  - name: PORT
    value: "8085"
  - name: LOG_LEVEL
    value: "info"
  - name: STORAGE_PROVIDER
    value: "gcs"
  - name: STORAGE_BUCKET
    value: "trip-manager-bucket"
  - name: AUTH_SERVICE_URL
    value: "http://auth.trip-manager-prod.svc.cluster.local:8082"
  - name: GCS_SIGNER_SA
    value: "presigner-sa@project-32c60644-299b-4b05-8cf.iam.gserviceaccount.com"
  - name: CORS_ALLOWED_ORIGINS
    value: "https://neatnode.xyz,https://www.neatnode.xyz"

serviceAccount:
  gcpServiceAccount: "presigner-sa@project-32c60644-299b-4b05-8cf.iam.gserviceaccount.com"