image:
  pullPolicy: Always

replicaCount: 1

service:
  healthPath: /health

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

hpa:
  enabled: false

externalSecrets:
  enabled: true
  secrets:
    - secretKey: MIGRATION_DB_URL
      remoteKey: trips-migration-url
    - secretKey: DATABASE_URL
      remoteKey: trips-database-url
    - secretKey: APP_DB_PASSWORD
      remoteKey: trips-app-database-password

envFrom:
  - secretRef:
      name: trips-secrets

env:
  - name: PORT
    value: "8084"
  - name: LOG_LEVEL
    value: "info"
  - name: AUTH_SERVICE_URL
    value: "http://auth.trip-manager-staging.svc.cluster.local:8082"
  - name: USERS_SERVICE_URL
    value: "http://users.trip-manager-staging.svc.cluster.local:8083"
  - name: GCP_PROJECT_ID
    value: "project-32c60644-299b-4b05-8cf"
  - name: PUBSUB_TOPIC_ID
    value: "trip-events"
  - name: CORS_ALLOWED_ORIGINS
    value: "https://staging.neatnode.xyz"
  - name: OTEL_COLLECTOR_ENDPOINT
    value: "otel-collector.trip-manager-staging.svc.cluster.local:4317"
  - name: S3_ENDPOINT
    value: "https://storage.googleapis.com"
  - name: S3_BUCKET
    value: "trip-manager-bucket"

serviceAccount:
  gcpServiceAccount: "trips-sa@project-32c60644-299b-4b05-8cf.iam.gserviceaccount.com"