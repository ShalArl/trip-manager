image:
  pullPolicy: Never

replicaCount: 1

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

hpa:
  enabled: false

env:
  - name: PORT
    value: "8084"
  - name: LOG_LEVEL
    value: "debug"
  - name: AUTH_SERVICE_URL
    value: "http://auth.trip-manager-dev.svc.cluster.local:8082"
  - name: DATABASE_URL
    value: "postgres://trips:trips@trips-postgres.trip-manager-dev.svc.cluster.local:5432/trips?sslmode=disable"
  - name: USERS_SERVICE_URL
    value: "http://users.trip-manager-dev.svc.cluster.local:8083"
  - name: GCP_PROJECT_ID
    value: "trip-manager-local"
  - name: PUBSUB_TOPIC_ID
    value: "trip-events"
  - name: PUBSUB_EMULATOR_HOST
    value: "pubsub-emulator.trip-manager-dev.svc.cluster.local:8085"
  - name: CORS_ALLOWED_ORIGINS
    value: "http://localhost:3000"