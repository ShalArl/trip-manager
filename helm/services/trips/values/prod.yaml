externalSecrets:
  enabled: true
  secrets:
    - secretKey: DATABASE_URL
      remoteKey: trips-database-url

envFrom:
  - secretRef:
      name: trips-secrets

env:
  - name: PORT
    value: "8084"
  - name: LOG_LEVEL
    value: "info"
  - name: AUTH_SERVICE_URL
    value: "http://auth.trip-manager.svc.cluster.local:8082"