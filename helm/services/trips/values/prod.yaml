replicaCount: 2

service:
  healthPath: /health

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3

externalSecrets:
  enabled: true
  secrets:
    - secretKey: DATABASE_URL
      remoteKey: trips-database-url

envFrom:
  - secretRef:
      name: trips-secrets

env:
  - name: PORT
    value: "8084"
  - name: LOG_LEVEL
    value: "info"
  - name: AUTH_SERVICE_URL
    value: "http://auth.trip-manager-prod.svc.cluster.local:8082"
  - name: USERS_SERVICE_URL
    value: "http://users.trip-manager-prod.svc.cluster.local:8083"
  - name: GCP_PROJECT_ID
    value: "project-32c60644-299b-4b05-8cf"
  - name: PUBSUB_TOPIC_ID
    value: "trip-events"
  - name: CORS_ALLOWED_ORIGINS
    value: "https://neatnode.xyz,https://www.neatnode.xyz"

serviceAccount:
  gcpServiceAccount: "trips-sa@project-32c60644-299b-4b05-8cf.iam.gserviceaccount.com"