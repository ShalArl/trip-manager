image:
  pullPolicy: Always

replicaCount: 2

service:
  healthPath: /health

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3

externalSecrets:
  enabled: true
  secrets:
    - secretKey: NEWSLETTER_DB_URL
      remoteKey: newsletter-postgres-url

envFrom:
  - secretRef:
      name: newsletter-secrets

env:
  - name: PORT
    value: "8070"
  - name: LOG_LEVEL
    value: "info"
  - name: AUTH_SERVICE_URL
    value: "http://auth.trip-manager-prod.svc.cluster.local:8082"
  - name: CORS_ALLOWED_ORIGINS
    value: "https://neatnode.xyz,https://www.neatnode.xyz"

serviceAccount:
  gcpServiceAccount: "newsletter-sa@project-32c60644-299b-4b05-8cf.iam.gserviceaccount.com"