replicaCount: 2

service:
  healthPath: /health

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3

externalSecrets:
  enabled: true
  secrets:
    - secretKey: DATABASE_URL
      remoteKey: newsletter-database-url

envFrom:
  - secretRef:
      name: newsletter-secrets

env:
  - name: PORT
    value: "8070"
  - name: LOG_LEVEL
    value: "info"
  - name: AUTH_SERVICE_URL
    value: "http://auth.trip-manager-prod.svc.cluster.local:8082"

serviceAccount:
  gcpServiceAccount: "newsletter-sa@project-32c60644-299b-4b05-8cf.iam.gserviceaccount.com"