image:
  repository: ""
  tag: ""
  pullPolicy: Always

service:
  port: 8070

replicaCount: 1

probes:
  liveness: /health
  readiness: /health

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPU: 70
  targetMemory: 80

env:
  - name: PORT
    value: "8070"
  - name: LOG_LEVEL
    value: "info"
  - name: CRON_SCHEDULE
    value: "0 0 * * *" # Einmal täglich um Mitternacht als Standard

envFrom: []

serviceAccount:
  gcpServiceAccount: ""

externalSecrets:
  enabled: false
  secrets: []