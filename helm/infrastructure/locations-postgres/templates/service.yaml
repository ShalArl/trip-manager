apiVersion: v1
kind: Service
metadata:
  name: locations-postgres
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: locations-postgres
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 5432

---

apiVersion: v1
kind: Service
metadata:
  name: locations-postgres-headless
  namespace: {{ .Release.Namespace }}
spec:
  clusterIP: None   # Headless
  selector:
    app: locations-postgres
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 5432