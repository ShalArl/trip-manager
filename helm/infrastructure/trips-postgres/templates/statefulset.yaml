apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: trips-postgres
  namespace: {{ .Release.Namespace }}
spec:
  serviceName: trips-postgres
  replicas: 1
  selector:
    matchLabels:
      app: trips-postgres
  template:
    metadata:
      labels:
        app: trips-postgres
    spec:
      containers:
        - name: trips-postgres
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgres.db }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user }}
            - name: POSTGRES_PASSWORD
              {{- if .Values.externalSecrets.enabled }}
              valueFrom:
                secretKeyRef:
                  name: trips-postgres-secret
                  key: POSTGRES_PASSWORD
              {{- else }}
              value: {{ .Values.postgres.password }}
              {{- end }}
          ports:
            - containerPort: 5432
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: postgres
          {{- end }}
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: trips-postgres-pvc
      {{- else}}
      volumes:
        - name: data
          emptyDir: { }
      {{- end }}