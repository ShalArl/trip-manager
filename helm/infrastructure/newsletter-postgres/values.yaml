image:
  repository: postgres
  tag: "16-alpine"

replicaCount: 1

postgres:
  db: newsletter
  user: newsletter
  password: newsletter

service:
  port: 5432

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

persistence:
  enabled: false
  size: 1Gi
  storageClass: ""

externalSecrets:
  enabled: false
  secrets: []