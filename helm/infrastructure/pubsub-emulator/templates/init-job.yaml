apiVersion: batch/v1
kind: Job
metadata:
  name: pubsub-init
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-emulator
          image: busybox
          command:
            - sh
            - -c
            - |
              until nc -z pubsub-emulator.{{ .Release.Namespace }}.svc.cluster.local 8085; do
                echo "Waiting for pubsub emulator..."
                sleep 2
              done
      containers:
        - name: pubsub-init
          image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
          env:
            - name: PUBSUB_EMULATOR_HOST
              value: "pubsub-emulator.{{ .Release.Namespace }}.svc.cluster.local:8085"
          command:
            - bash
            - -c
            - |
              gcloud config set project {{ .Values.projectId }}

              echo "Creating topics..."
              gcloud pubsub topics create trip-events --quiet || echo "topic already exists"

              echo "Creating subscriptions..."
              gcloud pubsub subscriptions create feed-generator-sub \
                --topic=trip-events \
                --quiet || echo "subscription already exists"

              echo "Pub/Sub init complete"