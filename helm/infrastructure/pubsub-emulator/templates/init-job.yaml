apiVersion: batch/v1
kind: Job
metadata:
  name: pubsub-init
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-emulator
          image: busybox
          command:
            - sh
            - -c
            - |
              until nc -z pubsub-emulator.{{ .Release.Namespace }}.svc.cluster.local 8085; do
                echo "Waiting for pubsub emulator..."
                sleep 2
              done
      containers:
        - name: pubsub-init
          image: curlimages/curl:8.10.1
          command:
            - sh
            - -c
            - |
              BASE=http://pubsub-emulator.{{ .Release.Namespace }}.svc.cluster.local:8085/v1/projects/{{ .Values.projectId }}
              echo "Creating topic..."
              curl -s -X PUT "$BASE/topics/trip-events"
              echo ""
              echo "Creating subscription..."
              curl -s -X PUT "$BASE/subscriptions/trip-events-sub" \
                -H "Content-Type: application/json" \
                -d '{"topic": "projects/{{ .Values.projectId }}/topics/trip-events"}'
              echo ""
              echo "Pub/Sub init complete"