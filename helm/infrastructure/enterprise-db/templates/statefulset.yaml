apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: trips-postgres-{{ .Values.tenantSlug }}
  namespace: {{ .Release.Namespace }}
spec:
  serviceName: trips-postgres-{{ .Values.tenantSlug }}
  replicas: 1
  selector:
    matchLabels:
      app: trips-postgres
      tenant: {{ .Values.tenantSlug }}
  template:
    metadata:
      labels:
        app: trips-postgres
        tenant: {{ .Values.tenantSlug }}
    spec:
      containers:
        - name: postgres
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgres.db }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.postgres.password }}
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: postgres
          resources: {{ toYaml .Values.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.persistence.storageClass }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}