server:
  persistentVolume:
    enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 200m
      memory: 512Mi

alertmanager:
  enabled: false

prometheus-pushgateway:
  enabled: false

kube-state-metrics:
  enabled: false

nodeExporter:
  enabled: false

serverFiles:
  prometheus.yml:
    scrape_configs:
      - job_name: otel-collector
        static_configs:
          - targets:
              - otel-collector.trip-manager-dev.svc.cluster.local:8889