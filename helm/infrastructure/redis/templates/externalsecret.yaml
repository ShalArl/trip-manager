{{- if .Values.redis.auth.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: redis-secret
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-store
    kind: ClusterSecretStore
  target:
    name: redis-secret
  data:
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: redis-password
{{- end }}