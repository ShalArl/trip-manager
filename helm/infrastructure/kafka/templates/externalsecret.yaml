{{- if .Values.kafka.auth.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kafka-secret
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-store
    kind: ClusterSecretStore
  target:
    name: kafka-secret
  data:
    - secretKey: KAFKA_PASSWORD
      remoteRef:
        key: kafka-password
{{- end }}