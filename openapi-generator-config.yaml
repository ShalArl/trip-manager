# OpenAPI Generator Configuration
# Defines how code is generated from api-spec/openapi.yaml

# Generator Selection - Generate only models/types, not full server
generatorName: go
packageName: api

# Output Configuration
outputDir: ./backend/internal/generated
inputSpec: ./api-spec/openapi.yaml

# Additional Go-specific options
additionalProperties:
  packageVersion: "1.0.0"
  isGoSubmodule: false
  enumClassPrefix: true
